name = "bail-sign-relay"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

kv_namespaces = [
  { binding = "SESSIONS_KV", id = "2aa3714428be4566a54d46d8ebe4740c" }
]

# Pas de R2 : les PDF sont stockés dans KV (voir src/storage.js). R2 exige une carte
# bancaire à l'activation, qu'on refuse pour rester 100 % gratuit.

[assets]
directory = "./public"
binding = "ASSETS"

# OTP email (vérification identité signataire).
#   EMAIL_MODE = "dev"    → aucun envoi, le code est retourné/loggé (état par défaut tant qu'il n'y
#                           a pas de domaine vérifié). Tout le flux est testable ainsi.
#   EMAIL_MODE = "resend" → envoi réel via Resend. Bascule = changer cette var + redeploy.
#   EMAIL_FROM  : expéditeur. Dev/test → "onboarding@resend.dev" ; prod → "code@propryo.fr".
#   RESEND_API_KEY : SECRET, jamais ici → `npx wrangler secret put RESEND_API_KEY`.
[vars]
EMAIL_MODE = "dev"
EMAIL_FROM = "onboarding@resend.dev"
