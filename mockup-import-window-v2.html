<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ImmoTrack — Renseigner ce mouvement (v2 définitive — design système app)</title>
<!-- Polices RÉELLES de l'app (cf. index.html : IBM Plex Sans corps · Manrope titres · JetBrains Mono technique) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ======================================================================
     TOKENS — copiés à l'identique de css/main.css de l'app (v15.230)
     Light = :root ; Dark = [data-theme="dark"] (Boursorama bleu nuit).
     ====================================================================== */
  :root, [data-theme="light"]{
    --bg:#eef2f7; --sur:rgba(255,255,255,.93); --sur2:rgba(242,246,251,.97); --sur3:rgba(230,236,245,.8);
    --bor:rgba(0,0,0,.09); --bor2:rgba(0,0,0,.05);
    --t1:#1a2332; --t2:#5a6e87; --t3:#9aabbf;
    --blu:#3b7ef6; --grn:#16a34a; --red:#dc2626; --ora:#ea580c; --pur:#7c3aed; --acc:#3b7ef6;
    --bg-success:rgba(22,163,74,.10); --bg-danger:rgba(220,38,38,.10); --bg-warning:rgba(234,88,12,.12); --bg-info:rgba(59,126,246,.10);
    --fg-success:#16a34a; --fg-danger:#dc2626; --fg-warning:#ea580c; --fg-info:#3b7ef6;
    --bg-pur:rgba(124,58,237,.10);
    --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 18px rgba(0,0,0,.07);
    --shadow-lg:0 8px 40px rgba(0,0,0,.13),0 2px 8px rgba(0,0,0,.07);
    --shadow-card-hover:0 4px 16px rgba(59,126,246,.10),0 1px 3px rgba(0,0,0,.05);
    --r:8px; --rl:14px;
    --t-fast:120ms cubic-bezier(.4,0,.2,1); --t-normal:200ms cubic-bezier(.4,0,.2,1);
    --solid-sur:#ffffff;
  }
  [data-theme="dark"]{
    color-scheme:dark;
    --bg:#0A0E27; --sur:#141936; --sur2:#1A1F36; --sur3:#252b48;
    --bor:rgba(255,255,255,.08); --bor2:rgba(255,255,255,.05);
    --t1:#F3F5FA; --t2:#A0A8C3; --t3:#6B7395;
    --blu:#5C8AFF; --grn:#34D399; --red:#F87171; --ora:#FBB040; --pur:#7B5BFF; --acc:#0E73F6;
    --bg-success:rgba(52,211,153,.14); --bg-danger:rgba(248,113,113,.14); --bg-warning:rgba(251,176,64,.14); --bg-info:rgba(92,138,255,.14);
    --fg-success:#34D399; --fg-danger:#F87171; --fg-warning:#FBB040; --fg-info:#5C8AFF;
    --bg-pur:rgba(123,91,255,.16);
    --shadow:0 1px 2px rgba(0,0,0,.35);
    --shadow-lg:0 16px 40px rgba(0,0,0,.55);
    --shadow-card-hover:0 4px 18px rgba(0,0,0,.45);
    --solid-sur:#141936;
  }

  *{box-sizing:border-box}
  body{margin:0;font-family:'IBM Plex Sans',system-ui,-apple-system,'Segoe UI',sans-serif;
    background:var(--bg);color:var(--t1);font-size:14px;line-height:1.5;
    -webkit-font-smoothing:antialiased}
  h1,h2,h3{font-family:'Manrope',sans-serif}

  /* ===== Barre de contrôle de la maquette (hors app) ===== */
  .mk-bar{position:sticky;top:0;z-index:60;background:#0d1330;color:#e8ecf6;display:flex;
    flex-wrap:wrap;gap:14px;align-items:center;padding:10px 18px;font-size:13px;
    box-shadow:0 2px 14px rgba(0,0,0,.35)}
  .mk-bar b{font-family:'Manrope',sans-serif;font-weight:800;color:#fff;letter-spacing:.2px}
  .mk-grp{display:flex;gap:4px;background:rgba(255,255,255,.07);border-radius:9px;padding:3px;flex-wrap:wrap}
  .mk-grp button{border:0;background:transparent;color:#9aa6c4;padding:5px 12px;border-radius:6px;cursor:pointer;
    font-size:12px;font-weight:600;font-family:inherit;transition:all var(--t-fast)}
  .mk-grp button:hover{color:#cdd6ec}
  .mk-grp button.on{background:#3b7ef6;color:#fff;box-shadow:0 2px 8px rgba(59,126,246,.4)}
  .mk-bar .lbl{color:#7c89ad;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;font-weight:600}

  /* ===== Cadre device ===== */
  .mk-stage{display:flex;justify-content:center;padding:30px 14px 110px}
  .mk-wrap{width:1000px;max-width:100%;transition:width .28s var(--t-normal);position:relative}
  .mk-wrap[data-d="tab"]{width:760px}
  .mk-wrap[data-d="mob"]{width:392px}

  /* ===== Composants app (calqués sur css/main.css) ===== */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 17px;border-radius:var(--r);
    border:none;cursor:pointer;font-size:13.5px;font-weight:600;font-family:'IBM Plex Sans',sans-serif;
    white-space:nowrap;transition:all .15s;letter-spacing:.1px}
  .btn:disabled{opacity:.38;cursor:not-allowed}
  .bp{background:var(--blu);color:#fff;box-shadow:0 2px 8px rgba(59,126,246,.3)}
  .bp:hover:not(:disabled){background:#2d6de0;box-shadow:0 4px 16px rgba(59,126,246,.42);transform:translateY(-1px)}
  [data-theme="dark"] .bp{background:#0E73F6;box-shadow:0 2px 10px rgba(14,115,246,.45)}
  [data-theme="dark"] .bp:hover:not(:disabled){background:#2b86ff}
  .bs{background:var(--sur2);color:var(--t1);border:1px solid var(--bor)}
  .bs:hover:not(:disabled){background:var(--sur3);border-color:var(--blu)}

  .fg{margin-bottom:15px}
  .fg2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  label{display:block;font-size:11.5px;font-weight:700;color:var(--t2);margin-bottom:6px;letter-spacing:.15px}
  label .mu{font-weight:500}
  .inp{width:100%;background:var(--sur2);border:1.5px solid var(--bor);border-radius:var(--r);color:var(--t1);
    padding:10px 12px;font-size:13.5px;font-family:'IBM Plex Sans',sans-serif;transition:border .15s,box-shadow .15s}
  .inp:focus{outline:none;border-color:var(--blu);box-shadow:0 0 0 3px rgba(59,126,246,.14)}
  .inp::placeholder{color:var(--t3)}
  select.inp{cursor:pointer}
  [data-theme="dark"] select.inp,[data-theme="dark"] select{background-color:#1a2332;color:var(--t1)}
  [data-theme="dark"] option{background:#141936;color:var(--t1)}
  .mu{color:var(--t3)} .sm{font-size:12px}
  .num{font-family:'Manrope',sans-serif;font-feature-settings:"tnum" 1;font-variant-numeric:tabular-nums}

  /* ===== Modale type app ===== */
  .modal{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rl);box-shadow:var(--shadow-lg);overflow:hidden}
  /* surface opaque pour la modale (les tokens --sur ont une alpha en clair → on pose un fond plein dessous) */
  .win .modal,.list-card{background:var(--solid-sur)}
  .m-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:17px 22px;border-bottom:1px solid var(--bor)}
  .m-head h3{margin:0;font-size:16.5px;font-weight:700}
  .m-head .sub{font-size:12px;color:var(--t3);margin-top:5px;font-weight:500;display:flex;align-items:center;gap:7px;flex-wrap:wrap;line-height:1.4}
  .m-close{background:none;border:none;color:var(--t2);cursor:pointer;font-size:19px;padding:4px 6px;border-radius:7px;transition:all .15s;line-height:1}
  .m-close:hover{color:var(--t1);background:var(--sur3)}
  .m-body{padding:20px 22px}
  .m-foot{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:14px 22px;border-top:1px solid var(--bor);background:var(--sur2)}
  .m-foot .right{display:flex;gap:9px;flex-wrap:wrap;justify-content:flex-end}
  .m-foot .left{display:flex;gap:9px;align-items:center;min-width:0}

  /* pilule source 🏦 + puce périmètre 🏢 (en-tête) */
  .src-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px;
    background:var(--bg-info);color:var(--fg-info)}
  .scope-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px;
    background:var(--bg-warning);color:var(--fg-warning)}

  /* ====================================================================
     LISTE D'IMPORT (récap à onglets)
     ==================================================================== */
  .imp-stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .stat{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;padding:6px 13px;border-radius:22px;
    border:1px solid var(--bor);background:var(--sur2);color:var(--t2)}
  .stat b{font-family:'Manrope',sans-serif;font-weight:800;color:var(--t1)}
  .stat.todo{border-color:transparent;color:var(--fg-warning);background:var(--bg-warning)}
  .stat.todo b{color:var(--fg-warning)}
  .stat.ok{border-color:transparent;color:var(--fg-success);background:var(--bg-success)}
  .stat.ok b{color:var(--fg-success)}
  .scope-band{display:flex;align-items:center;gap:9px;flex-wrap:wrap;background:var(--bg-info);
    border:1px solid rgba(59,126,246,.22);border-radius:var(--rl);padding:10px 14px;font-size:12.5px;color:var(--fg-info);font-weight:600;margin-bottom:14px}

  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--bor);margin-bottom:14px;flex-wrap:wrap}
  .tabs button{border:0;background:transparent;color:var(--t3);padding:10px 15px;cursor:pointer;font-size:13px;font-weight:700;
    border-bottom:2px solid transparent;display:flex;align-items:center;gap:7px;margin-bottom:-1px;font-family:inherit;transition:color var(--t-fast)}
  .tabs button:hover{color:var(--t2)}
  .tabs button.on{color:var(--blu);border-bottom-color:var(--blu)}
  .tabs .badge{font-size:11px;font-weight:800;font-family:'Manrope',sans-serif;padding:1px 8px;border-radius:11px;background:var(--sur3);color:var(--t2)}
  .tabs button.on .badge{background:var(--blu);color:#fff}

  /* ligne de mouvement — libellé en SANS (jamais mono), montant Manrope tabulaire */
  .row{display:flex;align-items:center;gap:13px;padding:12px 14px;border:1px solid var(--bor);border-radius:var(--rl);
    margin-bottom:9px;background:var(--sur2);cursor:pointer;border-left:3px solid transparent;
    transition:box-shadow var(--t-fast),transform var(--t-fast),border-color var(--t-fast)}
  .row:hover{box-shadow:var(--shadow-card-hover);border-color:var(--bor);transform:translateY(-1px)}
  .row:hover{border-left-color:var(--blu)}
  .row:active{transform:translateY(0)}
  .row.cr{border-left-color:var(--grn)} .row.db{border-left-color:var(--red)}
  .row .ic{font-size:18px;flex:0 0 auto;width:34px;height:34px;display:flex;align-items:center;justify-content:center;
    border-radius:10px;background:var(--bg);border:1px solid var(--bor2)}
  .row.cr .ic{background:var(--bg-success)} .row.db .ic{background:var(--bg-danger)}
  .row .mid{flex:1;min-width:0}
  .row .l1{display:flex;align-items:baseline;gap:10px;justify-content:space-between}
  .row .lib{font-size:13.5px;font-weight:600;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.1px}
  .row .amt{font-family:'Manrope',sans-serif;font-weight:800;font-size:15px;flex:0 0 auto;font-variant-numeric:tabular-nums;letter-spacing:-.2px}
  .row .amt.cr{color:var(--fg-success)} .row .amt.db{color:var(--fg-danger)}
  .row .l2{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap}
  .row .cat{font-size:12px;color:var(--t2);font-weight:600}
  .row .cat.empty{color:var(--fg-warning);font-style:italic}
  .chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:2px 9px;border-radius:7px;
    background:var(--bg);border:1px solid var(--bor);color:var(--t2)}
  .chip.bien{background:var(--bg-info);border-color:transparent;color:var(--fg-info)}
  .chip.conf{background:var(--bg-success);border-color:transparent;color:var(--fg-success)}
  .chip.todo{background:var(--bg-warning);border-color:transparent;color:var(--fg-warning)}
  .chip.dup{background:var(--bg);color:var(--t3)}
  .chip.split{background:var(--bg-pur);border-color:transparent;color:var(--pur)}
  .row .go{flex:0 0 auto;color:var(--t3);font-size:18px;transition:transform var(--t-fast),color var(--t-fast)}
  .row:hover .go{color:var(--blu);transform:translateX(2px)}
  .row.done{opacity:.62}
  .row.done .go{color:var(--fg-success);transform:none}

  .cta-complete{display:flex;align-items:center;justify-content:space-between;gap:13px;flex-wrap:wrap;
    background:var(--bg-warning);border:1px solid rgba(234,88,12,.22);border-radius:var(--rl);padding:14px 16px;margin:2px 0 16px}
  .cta-complete.ready{background:var(--bg-success);border-color:rgba(22,163,74,.22)}
  .cta-complete .txt{font-size:13px;color:var(--t1);font-weight:700}
  .cta-complete .txt small{display:block;font-weight:500;color:var(--t2);margin-top:3px;line-height:1.45}

  /* ====================================================================
     FENÊTRE « Renseigner ce mouvement » — overlay + barre de progression
     ==================================================================== */
  .overlay{position:fixed;inset:0;background:rgba(8,12,30,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;z-index:200;overflow:auto}
  .win{width:840px;max-width:100%}

  /* En-tête de progression de l'import (compteur N/total + barre + pastilles) */
  .prog{display:flex;align-items:center;gap:14px;background:var(--solid-sur);border:1px solid var(--bor);border-bottom:0;
    border-radius:var(--rl) var(--rl) 0 0;padding:13px 20px}
  .prog .step{font-family:'Manrope',sans-serif;font-weight:800;font-size:14px;white-space:nowrap;letter-spacing:-.1px;display:flex;align-items:center;gap:8px}
  .prog .step .pin{font-size:11px;font-weight:700;color:var(--blu);background:var(--bg-info);padding:2px 8px;border-radius:7px}
  .prog .bar{flex:1;height:8px;border-radius:6px;background:var(--sur3);overflow:hidden;position:relative}
  .prog .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--blu),#2d6de0);width:0;
    border-radius:6px;transition:width .35s cubic-bezier(.4,0,.2,1)}
  [data-theme="dark"] .prog .bar>i{background:linear-gradient(90deg,#0E73F6,#3A8EFB)}
  .prog .dots{display:flex;gap:5px;flex-wrap:wrap}
  .prog .dot{width:9px;height:9px;border-radius:50%;background:var(--sur3);transition:all var(--t-fast)}
  .prog .dot.done{background:var(--grn)} .prog .dot.cur{background:var(--blu);box-shadow:0 0 0 3px var(--bg-info);transform:scale(1.15)}
  .win .modal{border-radius:0 0 var(--rl) var(--rl)}

  /* bandeau état (📝 à renseigner / ✨ reconnu) */
  .recobn{display:flex;align-items:center;gap:9px;padding:10px 14px;border-radius:var(--r);font-size:12.5px;font-weight:600;margin-bottom:16px;line-height:1.4}
  .recobn.ok{background:var(--bg-success);color:var(--fg-success);border:1px solid rgba(22,163,74,.22)}
  .recobn.todo{background:var(--bg-warning);color:var(--fg-warning);border:1px solid rgba(234,88,12,.22)}
  .recobn .e{font-size:15px}

  /* SEGMENTÉ : Affecter / Découper (cartes radio) */
  .mode{display:flex;gap:10px;margin:4px 0 16px}
  .mode button{flex:1;border:1.5px solid var(--bor);background:var(--sur2);color:var(--t2);border-radius:var(--r);
    padding:12px 12px;cursor:pointer;font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:10px;
    line-height:1.2;font-family:inherit;text-align:left;transition:all var(--t-fast);position:relative}
  .mode button:hover{border-color:var(--t3)}
  .mode button .e{font-size:19px;flex:0 0 auto}
  .mode button .lab{display:flex;flex-direction:column;gap:2px}
  .mode button small{font-weight:500;color:var(--t3);font-size:10.5px;line-height:1.25}
  .mode button.on{border-color:var(--blu);background:var(--bg-info);color:var(--blu);box-shadow:0 0 0 1px var(--blu) inset}
  .mode button.on small{color:var(--blu);opacity:.85}

  /* Zone affectation : pastilles niveau en CARTES (🏛️ SCI / 🏢 Immeuble / 🚪 Logement) */
  .aff-box{border:1px solid var(--bor);border-radius:var(--rl);padding:15px;background:var(--sur2);margin-top:2px}
  .aff-q{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:11px;display:flex;align-items:center;gap:8px}
  .aff-q .ic{font-size:17px}
  .lvl{display:flex;gap:8px;margin-bottom:13px;flex-wrap:wrap}
  .lvl button{flex:1;min-width:96px;border:1.5px solid var(--bor);background:var(--solid-sur);color:var(--t2);
    border-radius:var(--r);padding:11px 8px 9px;cursor:pointer;font-size:12.5px;font-weight:700;display:flex;
    flex-direction:column;align-items:center;gap:5px;line-height:1.15;font-family:inherit;position:relative;transition:all var(--t-fast)}
  .lvl button:hover{border-color:var(--t3);transform:translateY(-1px)}
  .lvl button .e{font-size:20px}
  .lvl button.on{border-color:var(--blu);background:var(--bg-info);color:var(--blu);box-shadow:0 0 0 1px var(--blu) inset}
  /* badge « suggéré » (pastille flottante en haut à droite) */
  .lvl button.sugg::after{content:'suggéré';position:absolute;top:-8px;right:-6px;font-size:9px;font-weight:800;
    color:#fff;background:var(--grn);padding:2px 7px;border-radius:8px;box-shadow:0 2px 6px rgba(22,163,74,.35);letter-spacing:.2px}
  [data-theme="dark"] .lvl button.sugg::after{color:#06231a}

  .recup{margin-top:12px;border-top:1px dashed var(--bor);padding-top:12px}
  .recup label.cbx{display:flex;align-items:flex-start;gap:9px;cursor:pointer;font-weight:600;color:var(--t2);font-size:13px}
  .recup input{margin-top:2px;width:16px;height:16px;accent-color:var(--pur);flex:0 0 auto}
  .recup .hint{display:block;font-size:11.5px;color:var(--t3);font-weight:400;margin-top:3px;line-height:1.4}
  .cc-pick{margin-top:11px}

  /* BADGE DESTINATION « → 2044 ligne X » */
  .dest{margin-top:14px;border-radius:var(--r);padding:13px 15px;display:flex;gap:12px;align-items:flex-start;
    font-size:13px;border:1px solid transparent}
  .dest .ic{font-size:21px;line-height:1;flex:0 0 auto}
  .dest .ttl{font-weight:700;font-size:13.5px;margin-bottom:3px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .dest .det{font-size:12px;color:var(--t2);line-height:1.5}
  .dest .tag2044{font-family:'Manrope',sans-serif;font-size:10.5px;font-weight:800;letter-spacing:.3px;padding:2px 8px;
    border-radius:7px;white-space:nowrap}
  .dest.tax{background:var(--bg-success);border-color:rgba(22,163,74,.25)} .dest.tax .ttl{color:var(--fg-success)}
  .dest.tax .tag2044{background:var(--grn);color:#fff}
  [data-theme="dark"] .dest.tax .tag2044{color:#06231a}
  .dest.recu{background:var(--bg-pur);border-color:rgba(124,58,237,.25)} .dest.recu .ttl{color:var(--pur)}
  .dest.recu .tag2044{background:var(--pur);color:#fff}
  .dest.none{background:var(--bg);border-color:var(--bor)} .dest.none .ttl{color:var(--t2)}

  /* Panneau Découper (split) */
  .sp-help{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:13px}
  .sp-help button{border:1px solid var(--bor);background:var(--sur2);color:var(--t2);border-radius:22px;padding:7px 14px;
    cursor:pointer;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:6px;font-family:inherit;transition:all var(--t-fast)}
  .sp-help button:hover{border-color:var(--t3)}
  .sp-help button.on{border-color:var(--pur);background:var(--bg-pur);color:var(--pur)}
  .sp-help .e{font-size:14px}
  .sp-hint{font-size:11.5px;color:var(--t3);margin:-3px 0 13px;line-height:1.5}
  .sp-hint b{color:var(--t2)}
  .sp-card{border:1px solid var(--bor);border-radius:var(--rl);padding:12px;margin-bottom:10px;background:var(--sur2)}
  .sp-card-top{display:flex;gap:8px;align-items:center;margin-bottom:9px;flex-wrap:wrap}
  .sp-card .inp{padding:8px 10px;font-size:12.5px;background:var(--solid-sur)}
  .sp-card-top .lib{flex:1;min-width:100px}
  .sp-card-top .mt{width:112px;text-align:right;flex:0 0 auto;font-family:'Manrope',sans-serif;font-weight:700;font-variant-numeric:tabular-nums}
  .sp-card-top .x{background:none;border:none;cursor:pointer;color:var(--red);font-size:15px;padding:0 3px;border-radius:6px;line-height:1}
  .sp-card-top .x:hover{background:var(--bg-danger)}
  .sens-tg{display:flex;border:1px solid var(--bor);border-radius:var(--r);overflow:hidden;flex:0 0 auto}

  .rdest.t{background:var(--bg-success);color:var(--fg-success)} .rdest.r{background:var(--bg-pur);color:var(--pur)}
  .rdest.n{background:var(--bg);color:var(--t3);border:1px solid var(--bor)}

  /* picker logement scopé + cherchable */
  .combo{position:relative}
  .combo-btn{display:flex;justify-content:space-between;align-items:center;gap:6px;text-align:left;cursor:pointer;width:100%;background:var(--solid-sur)}
  .combo-btn .cv{color:var(--t3);flex:0 0 auto}
  .combo-btn .lab{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .combo-pop{margin:8px 0 2px;background:var(--bg);border:1px solid var(--bor);border-radius:var(--r);padding:9px;max-height:248px;overflow:auto}
  .combo-search{width:100%;padding:9px 11px;border:1.5px solid var(--bor);border-radius:var(--r);background:var(--solid-sur);color:var(--t1);font-size:13px;font-family:inherit}
  .combo-search:focus{outline:none;border-color:var(--blu);box-shadow:0 0 0 3px rgba(59,126,246,.14)}
  .combo-count{font-size:10.5px;color:var(--t3);font-weight:600;margin:8px 2px 3px}
  .combo-grp{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);font-weight:800;margin:8px 2px 4px;border-top:1px solid var(--bor);padding-top:7px}
  .combo-opt{display:block;width:100%;text-align:left;border:0;background:transparent;color:var(--t1);padding:8px 10px;border-radius:7px;cursor:pointer;font-size:13px;font-family:inherit;transition:all var(--t-fast)}
  .combo-opt:hover{background:var(--bg-info);color:var(--blu)}
  .combo-opt b{font-family:'Manrope',sans-serif}
  .combo-more{font-size:11.5px;color:var(--t3);padding:6px 10px}

  /* Autres options repliable */
  .opts{margin-top:18px;border-top:1px solid var(--bor);padding-top:4px}
  .opts>summary{cursor:pointer;font-size:12.5px;font-weight:700;color:var(--t2);list-style:none;display:flex;align-items:center;gap:8px;padding:10px 0}
  .opts>summary::-webkit-details-marker{display:none}
  .opts>summary:hover{color:var(--t1)}
  .opts>summary .chev{transition:transform var(--t-fast);color:var(--t3);font-size:11px}
  .opts[open]>summary .chev{transform:rotate(90deg)}
  .opt-line{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:11px}
  .file-btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--bor);background:var(--sur2);border-radius:var(--r);padding:8px 13px;font-size:12.5px;font-weight:600;color:var(--t2);cursor:pointer;transition:all var(--t-fast)}
  .file-btn:hover{border-color:var(--blu);color:var(--blu)}

  /* écran de fin */
  .done-card{text-align:center;padding:38px 26px}
  .done-card .big{font-size:52px;line-height:1}
  .done-card h2{margin:14px 0 7px;font-size:23px;font-weight:800}
  .done-card p{color:var(--t2);font-size:14px;margin:0 0 22px}
  .done-sum{display:inline-flex;gap:26px;flex-wrap:wrap;justify-content:center;margin-bottom:24px;padding:16px 24px;border:1px solid var(--bor);border-radius:var(--rl);background:var(--sur2)}
  .done-sum .b{font-family:'Manrope',sans-serif;font-weight:800;font-size:24px;display:block;line-height:1.1}
  .done-sum span span{font-size:11.5px;color:var(--t3);font-weight:600;margin-top:3px;display:block}
  .done-card .acts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

  .note{font-size:11.5px;color:var(--t3);margin-top:9px;line-height:1.5}

  /* ===== Responsive : Tablette ===== */
  .mk-wrap[data-d="tab"] .win{width:100%}
  /* ===== Responsive : Téléphone → bottom-sheet ===== */
  .mk-wrap[data-d="mob"] .overlay{align-items:flex-end;padding:0}
  .mk-wrap[data-d="mob"] .win{width:100%}
  .mk-wrap[data-d="mob"] .prog{border-radius:0;padding:12px 16px;flex-wrap:wrap;gap:10px}
  .mk-wrap[data-d="mob"] .prog .dots{order:3;width:100%}
  .mk-wrap[data-d="mob"] .win .modal{border-radius:var(--rl) var(--rl) 0 0}
  .mk-wrap[data-d="mob"] .m-body{max-height:62vh;overflow-y:auto}
  .mk-wrap[data-d="mob"] .fg2{grid-template-columns:1fr}
  .mk-wrap[data-d="mob"] .mode{flex-direction:column}
  .mk-wrap[data-d="mob"] .sp-card-aff{grid-template-columns:1fr}
  .mk-wrap[data-d="mob"] .niv-mini{justify-content:flex-start}
  .mk-wrap[data-d="mob"] .m-foot{flex-direction:column;align-items:stretch}
  .mk-wrap[data-d="mob"] .m-foot .left{justify-content:space-between}
  .mk-wrap[data-d="mob"] .m-foot .right{justify-content:stretch}
  .mk-wrap[data-d="mob"] .m-foot .right .btn{flex:1}

  /* fallback media query réelle (si on ouvre la maquette en vrai petit écran) */
  @media(max-width:520px){
    .fg2{grid-template-columns:1fr}
    .sp-card-aff{grid-template-columns:1fr}
    .mode{flex-direction:column}
  }
</style>
</head>
<body>

<div class="mk-bar">
  <b>🧾 Renseigner ce mouvement — v2</b>
  <span class="lbl">Flux</span>
  <div class="mk-grp" id="g-flux">
    <button data-f="B" class="on">B · Liste + fenêtre (reco)</button>
    <button data-f="A">A · Assistant plein écran</button>
  </div>
  <span class="lbl">Format</span>
  <div class="mk-grp" id="g-device">
    <button data-d="pc" class="on">💻 Ordi</button>
    <button data-d="tab">📱 Tablette</button>
    <button data-d="mob">📲 Tél</button>
  </div>
  <span class="lbl">Thème</span>
  <div class="mk-grp" id="g-theme">
    <button data-t="light" class="on">☀️ Clair</button>
    <button data-t="dark">🌙 Sombre</button>
  </div>
</div>

<div class="mk-stage">
 <div class="mk-wrap" data-d="pc">
   <div id="screen"><!-- liste (Flux B) ou assistant (Flux A) --></div>
   <div id="overlay-host"></div>
 </div>
</div>

<script>
/* =====================================================================
   Données démo (modèle réel : entités>immeubles>logements + compteurs)
   ===================================================================== */
const ENT = [
  { nom:'SCI Keller', type:'SCI', imms:[
      { nom:'Freyming', logs:[
          {ref:'F-RDC', loc:'Pierre Martin', hc:480, ch:60},
          {ref:'F-101', loc:'Marie Durand',  hc:560, ch:60},
          {ref:'F-102', loc:'Karim Aziz',    hc:520, ch:50},
      ], ccs:[ {nom:'Eau froide générale', cle:'tantièmes'}, {nom:'Ascenseur', cle:'1/N parts égales'} ] },
      { nom:'Forbach Centre', logs:[ {ref:'FB-01', loc:'Léa Bernard', hc:620, ch:80} ], ccs:[] },
  ]},
  { nom:'SCI Patrimoine', type:'SCI', imms:[
      { nom:'Metz Gare', logs:[ {ref:'MZ-3A', loc:'Jean Petit', hc:700, ch:90} ], ccs:[] },
  ]},
];
const CATMETA = {
  'Loyers encaissés':                         {l:'211', t:'recette', niv:'log', icon:'🏠'},
  'Recettes diverses (parking, antennes…)':   {l:'213', t:'recette', niv:'imm', icon:'➕'},
  'Frais de gestion / honoraires / compta':   {l:'221', t:'charge',  niv:'imm', icon:'🧮'},
  "Primes d'assurance PNO":                   {l:'223', t:'charge',  niv:'imm', icon:'🛡️'},
  "Travaux de réparation et d'entretien":     {l:'224', t:'charge',  niv:'log', icon:'🔧'},
  'Taxe foncière (et taxes annexes)':         {l:'227', t:'charge',  niv:'imm', icon:'🏛️'},
  'Charges de copropriété':                   {l:'229', t:'charge',  niv:'imm', icon:'🏢', recupable:true},
  'Eau froide générale (immeuble)':           {l:'',    t:'recup',   niv:'imm', recup:true, ccName:'Eau froide générale', icon:'💧'},
  'Provision de charges (locataire)':         {l:'',    t:'recette', niv:'log', regul:true, icon:'💶'},
  'Prêt':                                     {l:'',    t:'special', niv:'imm', icon:'🏦'},
  "Prêt — Intérêts d'emprunt":                {l:'250', t:'interet', niv:'imm', icon:'📉'},
  'Divers (non déductible)':                  {l:'',    t:'special', niv:'log', icon:'🧾'},
};
const NIV_LBL = { sci:{e:'🏛️',l:'La SCI'}, imm:{e:'🏢',l:'Un immeuble'}, log:{e:'🚪',l:'Un logement'} };
const LIG_LBL = {'211':'Loyers encaissés','213':'Recettes diverses','221':'Frais de gestion / compta','223':'Assurances',
  '224':'Travaux','227':'Taxe foncière','229':'Charges copropriété','250':"Intérêts d'emprunt"};

/* File d'import : 12 lignes (2 reconnus + 7 à compléter + 3 doublons). state: 'todo' | 'ok' | 'dup'. */
let QUEUE = [
  {id:1,  date:'2026-01-10', lib:'VIR DE M JULIEN ZITO LOYER JANVIER',          cr:460,  db:0,    state:'dup',  cat:'Loyers encaissés', niv:'log', cible:'F-RDC'},
  {id:2,  date:'2026-01-12', lib:'PRLV EDF FACTURE ELECTRICITE',                cr:0,    db:80.50, state:'todo', cat:'',                  niv:null,  cible:null},
  {id:3,  date:'2026-01-15', lib:'PRLV EXPERT COMPTABLE FIDUCIA EXPERTISE',     cr:0,    db:240,  state:'todo', cat:'Frais de gestion / honoraires / compta', niv:'imm', cible:'Freyming', conf:55},
  {id:4,  date:'2026-01-20', lib:'COTIS ASSURANCE PNO AXA CONTRAT 8841',        cr:0,    db:38.40, state:'todo', cat:"Primes d'assurance PNO", niv:'imm', cible:'Freyming', conf:80},
  {id:5,  date:'2026-01-25', lib:'ECHEANCE PRET IMMOBILIER 00428155',           cr:0,    db:780,  state:'todo', cat:'Prêt', niv:'imm', cible:'Freyming', conf:70, suggestSplit:'pret'},
  {id:6,  date:'2026-01-29', lib:'VIR GERANCE ISELIN VERSEMENT NET 01/2026',   cr:1421, db:0, state:'todo', cat:'Loyers encaissés', niv:'log', cible:'F-RDC', suggestSplit:'gerance'},
  {id:7,  date:'2026-02-05', lib:'VIR MME MOMPER FABIENNE LOYER FEVRIER',       cr:124,  db:0,    state:'dup',  cat:'Loyers encaissés', niv:'log', cible:'F-102'},
  {id:8,  date:'2026-02-08', lib:'PRLV SYNDIC COPRO APPEL DE FONDS T1',         cr:0,    db:320,  state:'todo', cat:'Charges de copropriété', niv:'imm', cible:'Freyming', conf:85},
  {id:9,  date:'2026-02-12', lib:'VIR INST JEREMY YARDIN LOYER FEVRIER',        cr:430,  db:0,    state:'ok',   cat:'Loyers encaissés', niv:'log', cible:'F-101', conf:95},
  {id:10, date:'2026-02-15', lib:'CB STATION SERVICE TOTAL ENERGIES',          cr:0,    db:65,   state:'ok',   cat:'Divers (non déductible)', niv:'log', cible:'F-RDC', conf:60},
  {id:11, date:'2026-02-18', lib:'VIR INST SARL BATIPRO TRAVAUX SALLE DE BAIN',cr:0,    db:1200, state:'dup',  cat:"Travaux de réparation et d'entretien", niv:'log', cible:'F-101'},
  {id:12, date:'2026-02-22', lib:'PRLV TRESOR PUBLIC TAXE FONCIERE 2026',       cr:0,    db:1430, state:'todo', cat:'Taxe foncière (et taxes annexes)', niv:'imm', cible:'Freyming', conf:90},
];
const ACCT = { label:'CIC ···4021', scope:{niv:'imm', cible:'Freyming'} };

const walkIds = () => QUEUE.filter(m=>m.state==='todo').map(m=>m.id)
                 .concat(QUEUE.filter(m=>m.state==='ok').map(m=>m.id));

let flux = 'B';
let curId = null;
let mode = 'aff';
let activeTab = 'todo';
let cur = {};
let spRows = [], spMethod = 'manuel';
let combo = null;

const $ = id => document.getElementById(id);
const fmt = n => (Math.round(n*100)/100).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
const sfmt = n => (n>=0?'+':'−')+fmt(Math.abs(n));
const mvById = id => QUEUE.find(m=>m.id===id);
const isCr = m => m.cr>0;
const net = m => m.cr - m.db;
const catMeta = name => CATMETA[name] || {l:'',t:'charge',niv:'log',icon:'🧾'};
const findImm = nom => { for(const e of ENT){ const i=e.imms.find(x=>x.nom===nom); if(i)return i; } return null; };
const allLogs = () => ENT.flatMap(e=>e.imms.flatMap(i=>i.logs.map(l=>({...l,imm:i.nom,ent:e.nom}))));
const allImms = () => ENT.flatMap(e=>e.imms.map(i=>({nom:i.nom,ent:e.nom})));

/* ====================== ÉCRAN LISTE (Flux B) ====================== */
function rowHtml(m){
  const cm = catMeta(m.cat);
  const cr = isCr(m);
  const accent = cr?'cr':'db';
  const icon = m.cat ? cm.icon : (cr?'💰':'💳');
  let catTxt = m.cat ? `<span class="cat">${m.cat}</span>` : `<span class="cat empty">À catégoriser</span>`;
  let chips = '';
  if(m.done){ chips += `<span class="chip conf">✓ Validé</span>`; }
  else if(m.state==='ok'){ chips += `<span class="chip conf">✨ Reconnu ${m.conf}%</span>`; }
  else if(m.state==='todo'){ chips += `<span class="chip todo">À compléter</span>`; }
  else if(m.state==='dup'){ chips += `<span class="chip dup">⊘ Doublon</span>`; }
  if(m.cat && m.cible){ const e = m.niv==='log'?'🚪':m.niv==='sci'?'🏛️':'🏢'; chips += `<span class="chip bien">${e} ${m.cible}</span>`; }
  if(m.suggestSplit){ chips += `<span class="chip split">✂️ à découper</span>`; }
  return `<div class="row ${accent}${m.done?' done':''}" onclick="openMv(${m.id})">
    <span class="ic">${icon}</span>
    <div class="mid">
      <div class="l1"><span class="lib">${m.lib}</span><span class="amt ${accent}">${sfmt(net(m))}</span></div>
      <div class="l2">${catTxt}${chips}</div>
    </div>
    <span class="go">${m.done?'✓':'›'}</span>
  </div>`;
}
function renderList(){
  const todo = QUEUE.filter(m=>m.state==='todo');
  const ok   = QUEUE.filter(m=>m.state==='ok');
  const dup  = QUEUE.filter(m=>m.state==='dup');
  const restToComplete = todo.filter(m=>!m.done).length;
  const list = (activeTab==='todo'?todo:activeTab==='ok'?ok:dup);
  const tabBody = !list.length
    ? `<div class="note" style="padding:20px;text-align:center">Aucun mouvement ici.</div>`
    : list.map(rowHtml).join('');
  $('screen').innerHTML = `
   <div class="modal list-card">
    <div class="m-head">
      <div>
        <h3>🏦 Importer mouvements bancaires</h3>
        <div class="sub"><span class="src-pill">🏦 Import banque</span> Relevé ${ACCT.label} · 12 lignes</div>
      </div>
      <button class="m-close">✕</button>
    </div>
    <div class="m-body">
      <div class="imp-stats">
        <span class="stat">📄 <b>12</b> lignes lues</span>
        <span class="stat ok">✨ <b>${ok.length}</b> reconnus</span>
        <span class="stat todo">📝 <b>${todo.length}</b> à compléter</span>
        <span class="stat">⊘ <b>${dup.length}</b> doublons</span>
      </div>
      <div class="scope-band">📍 Compte ${ACCT.label} → 🏢 ${ACCT.scope.cible} · les choix sont filtrés sur ce périmètre <span class="mu">(échappatoire « voir tout » dans le picker)</span></div>

      ${restToComplete>0 ? `<div class="cta-complete">
        <div class="txt">📝 ${restToComplete} mouvement(s) à renseigner
          <small>Ouvre la fenêtre et enchaîne : valide une opération → la suivante s'ouvre.</small></div>
        <button class="btn bp" onclick="startWalk('todo')">▶ Compléter pas à pas</button>
      </div>` : `<div class="cta-complete ready">
        <div class="txt">✅ Tout est renseigné. Vérifie les reconnus si besoin, puis importe.
          <small>Astuce : la marche pas-à-pas te fait aussi confirmer chaque mouvement reconnu.</small></div>
        <button class="btn bs" onclick="startWalk('ok')">👁️ Revoir les reconnus</button>
      </div>`}

      <div class="tabs">
        <button class="${activeTab==='todo'?'on':''}" onclick="activeTab='todo';renderList()">📝 À compléter <span class="badge">${todo.length}</span></button>
        <button class="${activeTab==='ok'?'on':''}" onclick="activeTab='ok';renderList()">✨ Reconnus <span class="badge">${ok.length}</span></button>
        <button class="${activeTab==='dup'?'on':''}" onclick="activeTab='dup';renderList()">⊘ Doublons <span class="badge">${dup.length}</span></button>
      </div>
      ${activeTab==='dup'?`<div class="note" style="margin:-4px 0 12px">Déjà présents dans tes mouvements (même date + montant). Exclus de l'import par défaut — clique pour garder quand même.</div>`:''}
      ${tabBody}
    </div>
    <div class="m-foot">
      <span class="mu sm left">${restToComplete>0?`Encore ${restToComplete} à renseigner avant d'importer`:`Prêt à importer ${todo.length+ok.length} mouvement(s)`}</span>
      <div class="right">
        <button class="btn bs">Annuler</button>
        <button class="btn bp" ${restToComplete>0?'disabled':''}>✓ Valider et importer ${todo.length+ok.length}</button>
      </div>
    </div>
   </div>`;
}

/* ====================== MARCHE PAS-À-PAS ====================== */
let walkList = [];
let walkPos = 0;
function startWalk(kind){
  walkList = kind==='ok' ? QUEUE.filter(m=>m.state==='ok').map(m=>m.id)
           : kind==='all' ? walkIds()
           : QUEUE.filter(m=>m.state==='todo' && !m.done).map(m=>m.id);
  if(!walkList.length){ walkList = walkIds(); }
  walkPos = 0;
  openWalkAt(0);
}
function openWalkAt(pos){
  walkPos = pos;
  curId = walkList[pos];
  initCur(curId);
  renderWindow();
}
function openMv(id){
  const m = mvById(id);
  if(m.state==='dup'){ renderDupWindow(id); return; }
  walkList = walkIds();
  walkPos = Math.max(0, walkList.indexOf(id));
  curId = id; initCur(id); renderWindow();
}
function initCur(id){
  const m = mvById(id);
  mode = m.suggestSplit ? 'split' : 'aff';
  spMethod = m.suggestSplit || 'manuel';
  combo = null;
  cur = { niv:m.niv, ent:'SCI Keller', imm:(m.niv==='imm'?m.cible:'Freyming'),
          log:(m.niv==='log'?m.cible:'F-RDC'), recup:false, _catLock:(m.cat||''),
          cat:m.cat||'' };
  if(mode==='split') seedSplit(spMethod, m);
}

function closeWindow(){ curId=null; $('overlay-host').innerHTML=''; renderScreen(); }

function renderWindow(){
  const m = mvById(curId);
  const total = walkList.length;
  const pos = walkPos+1;
  const dots = walkList.map((id,i)=>{
    const mm=mvById(id); const c = i<walkPos||mm.done?'done':i===walkPos?'cur':'';
    return `<span class="dot ${c}"></span>`;
  }).join('');
  const pct = Math.round((walkPos)/total*100);
  const reco = m.state==='ok';
  $('overlay-host').innerHTML = `
   <div class="overlay">
    <div class="win">
      <div class="prog">
        <span class="step"><span class="pin">${reco?'Vérifier':'Renseigner'}</span> ${pos} / ${total}</span>
        <div class="bar"><i style="width:${pct}%"></i></div>
        <div class="dots">${dots}</div>
      </div>
      <div class="modal">
        <div class="m-head">
          <div>
            <h3>${reco?'Vérifier ce mouvement':'Renseigner ce mouvement'}</h3>

            ? `Reconnu automatiquement (${m.conf}%) — vérifie et corrige si besoin.`
            : `À renseigner — choisis la catégorie, l'app pose la bonne question.`}</div>

            <button data-m="split" class="${mode==='split'?'on':''}" onclick="setMode('split')"><span class="e">✂️</span><span class="lab"><span>Découper en lignes</span><small>plusieurs biens / locataires</small></span></button>

            <div class="opt-line"><label style="margin:0;min-width:90px">📎 Justificatif</label><span class="file-btn">📁 Choisir un fichier</span><span class="mu sm">Aucun document</span></div>
            <div class="opt-line"><label style="margin:0;min-width:90px">🔁 Récurrence</label><select class="inp" style="flex:1;min-width:120px"><option>Aucune (ponctuel)</option><option>Tous les mois</option><option>Tous les trimestres</option><option>Tous les ans</option></select></div>

            <button class="btn bs" onclick="skipStep()">Passer</button>
            <button class="btn bp" id="save" onclick="validateNext()">${pos<total?'Valider l\'opération →':'Valider et terminer ✓'}</button>
          </div>
        </div>
      </div>
    </div>
   </div>`;
  render();
}
function catOptions(sel){
  const ph = sel ? '' : `<option value="" selected disabled>— Choisir une catégorie —</option>`;
  const groups = {
    'Recettes':['Loyers encaissés','Recettes diverses (parking, antennes…)','Provision de charges (locataire)'],
    'Charges déductibles (impôts)':['Frais de gestion / honoraires / compta',"Primes d'assurance PNO","Travaux de réparation et d'entretien",'Taxe foncière (et taxes annexes)','Charges de copropriété'],
    'Charges récupérables (immeuble)':['Eau froide générale (immeuble)'],
    'Prêt':['Prêt',"Prêt — Intérêts d'emprunt"],
    'Hors déclaration':['Divers (non déductible)'],
  };
  return ph + Object.entries(groups).map(([g,arr])=>`<optgroup label="${g}">`+
    arr.map(c=>`<option ${c===sel?'selected':''}>${c}</option>`).join('')+`</optgroup>`).join('');
}

function prevStep(){ if(walkPos>0) openWalkAt(walkPos-1); }
function skipStep(){ goNext(); }
function validateNext(){
  const m = mvById(curId);

  m.niv = cur.niv; m.cible = cur.niv==='log'?cur.log:cur.niv==='sci'?cur.ent:cur.imm;

  goNext();
}
function goNext(){
  if(walkPos < walkList.length-1){ openWalkAt(walkPos+1); }
  else { renderDoneWindow(); }
}
function renderDoneWindow(){
  const done = QUEUE.filter(m=>m.done).length;

         <span><span class="b">${todo+ok}</span><span>à importer</span></span>
       </div>
       <div class="acts"><button class="btn bs" onclick="closeWindow()">Revoir la liste</button>

function renderDupWindow(id){

/* ====================== MODE AFFECTER ====================== */
function onCat(){ cur.cat=$('cat').value; cur._catLock=null; setMode(mode); }
function setMode(m){
  mode=m;
  document.querySelectorAll('#modesw button').forEach(b=>b.classList.toggle('on',b.dataset.m===m));
  render();
}
function render(){
  if(!curId) return;
  if(mode==='aff'){
    $('zone').innerHTML = renderAff();
    const selCat = $('cat')?$('cat').value:cur.cat;
    if($('save')) $('save').disabled = !selCat;
    if($('foot-info')) $('foot-info').textContent = selCat?'':'Choisis une catégorie pour valider';
  } else {
    $('zone').innerHTML = `
      <div class="sp-help" id="sp-help">
        <button data-sp="bail" onclick="seedSplit('bail')"><span class="e">📄</span>Selon le bail</button>
        <button data-sp="caf" onclick="seedSplit('caf')"><span class="e">👨‍👩‍👧</span>Par locataire (CAF)</button>
        <button data-sp="gerance" onclick="seedSplit('gerance')"><span class="e">🏦</span>Relevé de gérance</button>
        <button data-sp="pret" onclick="seedSplit('pret')"><span class="e">🏦</span>Échéance de prêt</button>
        <button data-sp="manuel" onclick="seedSplit('manuel')"><span class="e">✏️</span>Manuel</button>
      </div>
      <div class="sp-hint" id="sp-hint"></div>
      <div id="sp-rows"></div>
      <button class="sp-add" onclick="addRow()">+ Ajouter une ligne</button>
      <div class="sp-bal" id="sp-bal"></div>
      <div class="sp-bar" id="sp-bar"><i></i></div>`;
    renderSplit();
  }
}
function metaCur(){ return catMeta($('cat')?$('cat').value:cur.cat); }
function renderAff(){
  const selCat = $('cat')?$('cat').value:cur.cat;
  if(!selCat){
    return `<div class="aff-box"><div class="aff-q"><span class="ic">👆</span>Commence par la catégorie ci-dessus</div>`
      + `<div class="note" style="margin:0">Dès que tu choisis <b>ce que c'est</b>, l'app pose <b>une seule</b> question (logement / immeuble / SCI) et t'affiche où ça atterrit dans ta 2044.</div></div>`;
  }
  const m = metaCur();
  if(cur._catLock !== selCat){ cur.niv=m.niv; cur.recup=!!m.recup; cur._catLock=selCat; }
  const niv = cur.niv || m.niv;
  let h = `<div class="aff-box"><div class="aff-q"><span class="ic">${NIV_LBL[niv].e}</span>`;
  h += niv==='log' ? 'Quel logement&nbsp;?' : niv==='imm' ? 'Quel immeuble&nbsp;?' : 'Quelle entité / SCI&nbsp;?';
  h += `</div><div class="lvl">`;
  ['sci','imm','log'].forEach(k=>{
    const on = k===niv?' on':''; const sg=(k===m.niv && k!==niv)?' sugg':'';
    h += `<button class="${on}${sg}" onclick="cur.niv='${k}';render()"><span class="e">${NIV_LBL[k].e}</span>${NIV_LBL[k].l}</button>`;
  });
  h += `</div>`;
  if(niv==='sci') h += `<select class="inp" onchange="cur.ent=this.value;render()">`+ENT.map(e=>`<option${e.nom===cur.ent?' selected':''}>${e.nom}</option>`).join('')+`</select>`;
  if(niv==='imm') h += `<select class="inp" onchange="cur.imm=this.value;render()">`+allImms().map(i=>`<option${i.nom===cur.imm?' selected':''}>${i.nom}</option>`).join('')+`</select>`;
  if(niv==='log') h += `<div class="combo">`+comboBtn('aff', cur.log)+(combo&&combo.key==='aff'?comboPanel():'')+`</div>`;
  if(niv==='imm' && (m.t==='charge') && m.recupable){
    const im=findImm(cur.imm);
    if(im && im.ccs.length) h += `<div class="recup"><label class="cbx"><input type="checkbox" ${cur.recup?'checked':''} onchange="cur.recup=this.checked;render()"><span>Cette charge se récupère sur les locataires<span class="hint">→ je la répartis via un compteur collectif au lieu de la déduire aux impôts</span></span></label></div>`;
  }
  if(m.t==='recup' || (cur.recup && niv==='imm')){
    const im=findImm(cur.imm);
    if(im && im.ccs.length) h += `<div class="cc-pick"><label>Compteur collectif</label><select class="inp">`+im.ccs.map(c=>`<option>${c.nom} · clé ${c.cle}</option>`).join('')+`</select></div>`;
  }
  h += destHtml(m, niv) + `</div>`;
  return h;
}
function destHtml(m, niv){
  const recup=(m.t==='recup')||(cur.recup&&niv==='imm');
  if(recup){
    const im=findImm(cur.imm); const nLoc=im?im.logs.length:0; const cc=(im&&im.ccs[0])||{nom:'—',cle:'tantièmes'};
    return `<div class="dest recu"><span class="ic">👥</span><div><div class="ttl">Réparti sur ${nLoc} locataire(s) de ${cur.imm} <span class="tag2044">RÉGUL</span></div><div class="det">Compteur « ${cc.nom} » · clé ${cc.cle} → régularisation des charges. <span class="mu">Pas sur ta 2044 (ça se neutralise).</span></div></div></div>`;
  }
  if(m.t==='special') return `<div class="dest none"><span class="ic">📋</span><div><div class="ttl">Hors déclaration 2044</div><div class="det">${(($('cat')&&$('cat').value)==='Prêt')?'Capital remboursé — n\'entre pas dans le résultat foncier (sépare les intérêts via « Découper »).':'N\'entre pas dans le résultat foncier.'}</div></div></div>`;
  if(!m.l) return `<div class="dest none"><span class="ic">📋</span><div><div class="ttl">Hors déclaration</div><div class="det">N'entre pas dans le résultat foncier.</div></div></div>`;
  const where = niv==='sci'?`🏛️ ${cur.ent}`:niv==='imm'?`🏢 ${cur.imm}`:`🚪 ${cur.log}`;
  const s = m.t==='recette'?'Recette':m.t==='interet'?'Intérêts déductibles':'Charge déductible';
  return `<div class="dest tax"><span class="ic">🧾</span><div><div class="ttl">Déclaration 2044 — ${LIG_LBL[m.l]||''} <span class="tag2044">→ 2044 · ligne ${m.l}</span></div><div class="det">${s} · rattaché à ${where}.${niv==='imm'?' Comptée au total de l\'immeuble.':''}</div></div></div>`;
}

/* ====================== MODE DÉCOUPER ====================== */
function defCible(k){ return k==='sci'?(cur.ent||ENT[0].nom):k==='imm'?(cur.imm||'Freyming'):(cur.log||allLogs()[0].ref); }
function setRowSens(j,s){ spRows[j].sens=s; renderSplit(); }
function setRowNiv(j,k){ combo=null; const r=spRows[j]; r.niv=k; r.cible=defCible(k); renderSplit(); }
function setRowCat(j,v){ combo=null; const r=spRows[j]; r.cat=v; const cm=CATMETA[v]||{};
  if(cm.niv){ r.niv=cm.niv; r.cible=defCible(cm.niv); } r.sens=(cm.t==='recette')?'cr':'db'; renderSplit(); }
function nivMini(j){ const r=spRows[j]; const sug=(CATMETA[r.cat]||{}).niv;
  return `<div class="niv-mini">`+['sci','imm','log'].map(k=>`<button class="${k===r.niv?'on':''}${(k===sug&&k!==r.niv)?' sugg':''}" title="${NIV_LBL[k].l}" onclick="setRowNiv(${j},'${k}')">${NIV_LBL[k].e}</button>`).join('')+`</div>`; }
function cibleSelect(j){ const r=spRows[j];
  const opts = r.niv==='sci'?ENT.map(e=>[e.nom,e.nom]):r.niv==='imm'?allImms().map(i=>[i.nom,i.nom]):allLogs().map(l=>[l.ref,l.ref+' · '+l.loc]);
  return `<select class="inp" onchange="spRows[${j}].cible=this.value;renderSplit()">`+opts.map(([v,t])=>`<option value="${v}" ${v===r.cible?'selected':''}>${t}</option>`).join('')+`</select>`; }
function rowDest(r){ const cm=CATMETA[r.cat]||{l:'',t:'charge'};
  const where=r.niv==='sci'?`🏛️ ${r.cible}`:r.niv==='imm'?`🏢 ${r.cible}`:`🚪 ${r.cible}`;
  if(cm.t==='recup') return `<span class="rdest r">→ compteur · ${where}</span>`;
  if(cm.regul) return `<span class="rdest r">→ régularisation · ${where}</span>`;
  if(cm.t==='special') return `<span class="rdest n">→ hors 2044 · ${where}</span>`;
  if(cm.l){ const s=cm.t==='recette'?'recette':cm.t==='interet'?'intérêts':'charge'; return `<span class="rdest t">→ 2044·${cm.l} · ${s} · ${where}</span>`; }
  return `<span class="rdest n">→ hors 2044</span>`; }
const logByRef = ref => allLogs().find(x=>x.ref===ref);
function logLabel(ref){ const l=logByRef(ref); return l?`${l.ref} — ${l.loc}`:(ref||'Choisir un logement…'); }
function comboBtn(key, ref){ return `<button type="button" class="inp combo-btn" onclick="toggleCombo('${key}')"><span class="lab">${logLabel(ref)}</span><span class="cv">▾</span></button>`; }
function comboPanel(){ return `<div class="combo-pop"><input class="combo-search" id="combosearch" placeholder="🔍 Réf. ou nom du locataire…" oninput="combo.q=this.value;fillComboList()"><div id="combolist"></div></div>`; }
function toggleCombo(key){ combo=(combo&&combo.key===key)?null:{key,q:''}; render(); if(combo) setTimeout(()=>{const s=$('combosearch');if(s)s.focus();fillComboList();},0); }
function fillComboList(){ if(!combo) return; const q=(combo.q||'').toLowerCase().trim(); const scope=cur.imm;
  const filt=allLogs().filter(l=>(`${l.ref} ${l.loc} ${l.imm}`).toLowerCase().includes(q));
  const byImm={}; filt.forEach(l=>{(byImm[l.imm]=byImm[l.imm]||[]).push(l);});
  const imms=Object.keys(byImm).sort((a,b)=>a===scope?-1:b===scope?1:a.localeCompare(b,'fr',{numeric:true}));
  let h=`<div class="combo-count">${filt.length} logement(s)${q?` pour « ${combo.q} »`:` · immeuble du mouvement en premier`}</div>`;
  if(!filt.length) h+=`<div class="combo-more">Aucun résultat</div>`;
  imms.forEach(im=>{ h+=`<div class="combo-grp">${im===scope?'📍 ':''}${im} <span class="mu">(${byImm[im].length})</span></div>`;
    byImm[im].slice(0,30).forEach(l=>{h+=`<button type="button" class="combo-opt" onclick="chooseLog('${l.ref}')"><b>${l.ref}</b> — ${l.loc}</button>`;});
    if(byImm[im].length>30) h+=`<div class="combo-more">+ ${byImm[im].length-30} autres — précise ta recherche</div>`; });
  const el=$('combolist'); if(el) el.innerHTML=h; }
function chooseLog(ref){ if(!combo) return; const key=combo.key; combo=null;
  if(key==='aff'){ cur.log=ref; render(); } else { const j=+key.split(':')[1]; if(spRows[j]) spRows[j].cible=ref; renderSplit(); } }

function seedSplit(method, mv){
  spMethod=method; const m = mv || mvById(curId);
  const im=findImm(cur.imm)||ENT[0].imms[0];
  if(method==='bail'){
    const l=im.logs.find(x=>x.ref===cur.log)||im.logs[0];
    spRows=[{sens:'cr',lib:'Loyer hors charges',montant:l.hc,cat:'Loyers encaissés',niv:'log',cible:l.ref},
            {sens:'cr',lib:'Provision de charges',montant:l.ch,cat:'Provision de charges (locataire)',niv:'log',cible:l.ref}];
  } else if(method==='caf'){
    spRows=im.logs.slice(0,2).map(l=>({sens:'cr',lib:'APL '+l.loc,montant:Math.round(l.hc*0.4),cat:'Loyers encaissés',niv:'log',cible:l.ref}));
  } else if(method==='gerance'){
    const loy=im.logs.map(l=>({sens:'cr',lib:'Loyer '+l.loc,montant:l.hc,cat:'Loyers encaissés',niv:'log',cible:l.ref}));
    const brut=im.logs.reduce((s,l)=>s+l.hc,0);
    spRows=[...loy,{sens:'db',lib:'Frais de gestion 7%',montant:Math.round(brut*0.07),cat:'Frais de gestion / honoraires / compta',niv:'imm',cible:im.nom},
            {sens:'db',lib:'Assurance GLI',montant:30,cat:"Primes d'assurance PNO",niv:'imm',cible:im.nom}];
  } else if(method==='pret'){
    const ech=m?Math.abs(net(m)):780;
    spRows=[{sens:'db',lib:'Capital remboursé',montant:Math.round(ech*0.45),cat:'Prêt',niv:'imm',cible:im.nom},
            {sens:'db',lib:"Intérêts d'emprunt",montant:Math.round(ech*0.5),cat:"Prêt — Intérêts d'emprunt",niv:'imm',cible:im.nom},
            {sens:'db',lib:'Assurance emprunteur',montant:ech-Math.round(ech*0.45)-Math.round(ech*0.5),cat:"Primes d'assurance PNO",niv:'imm',cible:im.nom}];
  } else {
    const c=cur.cat,cm=CATMETA[c]||{};
    spRows=[{sens:(m&&isCr(m))?'cr':'db',lib:'Ligne 1',montant:'',cat:c,niv:cm.niv||'log',cible:cur.log},
            {sens:(m&&isCr(m))?'cr':'db',lib:'Ligne 2',montant:'',cat:c,niv:cm.niv||'log',cible:cur.log}];
  }
  if($('sp-rows')) renderSplit();
}
function renderSplit(){
  document.querySelectorAll('#sp-help button').forEach(b=>b.classList.toggle('on',b.dataset.sp===spMethod));
  const hint=$('sp-hint'); if(hint) hint.innerHTML = spMethod==='bail'
    ? "Pré-rempli depuis le bail : loyer → 2044 (211), provision de charges → régularisation locataire."
    : spMethod==='caf'?"Une ligne par locataire bénéficiaire de l'APL."
    : spMethod==='gerance'?"Relevé de gérance : loyers en <b>crédit</b> + frais en <b>débit</b>. Équilibre sur le net."
    : spMethod==='pret'?"Échéance de prêt : capital (hors 2044) + intérêts (ligne 250) + assurance. Saisis les montants depuis ton tableau d'amortissement."
    : "Chaque ligne a son sens, sa catégorie et son affectation. L'équilibre se fait sur le net.";
  const cats=Object.keys(CATMETA);
  $('sp-rows').innerHTML = spRows.map((r,j)=>`
    <div class="sp-card">
      <div class="sp-card-top">
        <div class="sens-tg"><button class="db ${r.sens==='db'?'on':''}" onclick="setRowSens(${j},'db')">− Débit</button><button class="cr ${r.sens==='cr'?'on':''}" onclick="setRowSens(${j},'cr')">+ Crédit</button></div>
        <input class="inp lib" placeholder="Libellé" value="${r.lib}" oninput="spRows[${j}].lib=this.value">
        <input class="inp mt" type="number" step="0.01" placeholder="Montant" value="${r.montant}" oninput="spRows[${j}].montant=this.value;balance()">
        ${spRows.length>1?`<button class="x" title="Supprimer" onclick="spRows.splice(${j},1);renderSplit()">✕</button>`:''}
      </div>
      <div class="sp-card-aff">
        <select class="inp" onchange="setRowCat(${j},this.value)">${cats.map(c=>`<option ${c===r.cat?'selected':''}>${c}</option>`).join('')}</select>
        ${nivMini(j)}
        ${r.niv==='log'?`<div class="combo">${comboBtn('sp:'+j,r.cible)}</div>`:cibleSelect(j)}
      </div>
      ${(combo&&combo.key==='sp:'+j)?comboPanel():''}
      <div class="sp-dest">${rowDest(r)}</div>
    </div>`).join('');
  balance();
}
function addRow(){ const c=cur.cat,cm=CATMETA[c]||{}; spRows.push({sens:'db',lib:'Ligne '+(spRows.length+1),montant:'',cat:c,niv:cm.niv||'log',cible:cur.log}); renderSplit(); }
function balance(){
  const bankNet=(parseFloat($('cr').value)||0)-(parseFloat($('db').value)||0);
  const n=spRows.reduce((s,r)=>{const v=parseFloat(r.montant)||0;return s+(r.sens==='cr'?v:-v);},0);
  const reste=Math.round((bankNet-n)*100)/100, ok=Math.abs(reste)<0.005;
  const denom=Math.abs(bankNet)||1, pct=Math.min(100,Math.round(Math.abs(n)/denom*100));
  const nf=x=>(x<0?'− ':'')+fmt(Math.abs(x));
  if($('sp-bal')) $('sp-bal').innerHTML=`<span>Net réparti : <strong>${nf(n)}</strong> · reste <span class="${ok?'ok':'ko'}">${ok?'✅ équilibré':nf(reste)}</span></span><span>Net bancaire : <strong>${nf(bankNet)}</strong></span>`;
  const bar=$('sp-bar'); if(bar){ bar.classList.toggle('full',ok); bar.firstElementChild.style.width=pct+'%'; }
  if($('save')) $('save').disabled=!ok;
  if($('foot-info')) $('foot-info').textContent= ok?'':'Le net des lignes doit égaler le net bancaire';
}

/* ====================== ASSISTANT PLEIN ÉCRAN (Flux A) ====================== */
function renderScreen(){
  if(flux==='B'){ activeTab='todo'; renderList(); }
  else {
    const todo=QUEUE.filter(m=>m.state==='todo').length, ok=QUEUE.filter(m=>m.state==='ok').length;
    $('screen').innerHTML = `<div class="modal list-card"><div class="m-head"><div><h3>🏦 Import bancaire — assistant</h3>
       <div class="sub"><span class="src-pill">🏦 Import banque</span> Relevé ${ACCT.label} · 12 lignes</div></div></div>
       <div class="m-body" style="text-align:center;padding:34px">
         <div style="font-size:44px">🧭</div>
         <h2 style="margin:10px 0 5px;font-size:21px">${todo+ok} mouvements à passer en revue</h2>
         <p class="mu" style="margin:0 0 20px">L'assistant t'ouvre chaque mouvement l'un après l'autre. Valide → le suivant s'ouvre.</p>
         <button class="btn bp" onclick="startWalk('all')">▶ Démarrer l'assistant</button>
         <div class="note" style="margin-top:16px">Les 3 doublons sont exclus automatiquement.</div>
       </div></div>`;
  }
}

/* ====================== contrôles maquette ====================== */
$('g-flux').onclick=e=>{const b=e.target.closest('button');if(!b)return;
  document.querySelectorAll('#g-flux button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  flux=b.dataset.f; curId=null; $('overlay-host').innerHTML=''; renderScreen();
  if(flux==='A') startWalk('all'); };
$('g-device').onclick=e=>{const b=e.target.closest('button');if(!b)return;
  document.querySelectorAll('#g-device button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  document.querySelector('.mk-wrap').dataset.d=b.dataset.d;};
$('g-theme').onclick=e=>{const b=e.target.closest('button');if(!b)return;
  document.querySelectorAll('#g-theme button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  document.documentElement.dataset.theme=b.dataset.t;};

renderScreen();
</script>
