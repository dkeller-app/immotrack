name: Tests Vitest

on:
  push:
    branches: [main, master, claude/*]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Vitest unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # v15.X 2026-05-17 — Node 24 (aligné avec env dev local npm 11).
          # Node 20 + npm 10 faisait fail npm ci car le lockfile a été généré
          # avec npm 11. De plus, Node 20 = déprécié dès le 2 juin 2026.
          node-version: '24'
          # cache: 'npm'  ← retiré 2026-05-17 (50 runs fail consécutifs).

      - name: Install dependencies
        # 2026-05-17 — npm install au lieu de npm ci :
        # npm ci est strict (exige lockfile <-> package.json parfaitement synchros).
        # Cause des fails CI précédents : désynchro lockfile générée par npm 11 local
        # vs résolution npm 11 CI (différences mineures de hash).
        # npm install est tolérant et regénère le lockfile au besoin sans planter.
        # --no-audit --no-fund : zappe les audit + sponsor (gain de temps + bruit).
        run: npm install --no-audit --no-fund

      - name: Run tests
        run: npm run test:run

      - name: Syntax check inline scripts in index.html
        run: node scripts/check-inline-js.mjs
