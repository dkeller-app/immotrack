name: Tests Vitest

on:
  push:
    branches: [main, master, claude/*]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Vitest unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache: 'npm'  ← retiré 2026-05-17 (50 runs fail consécutifs sur cette
          # ligne, cause probable : clé cache invalide). Sans cache, npm ci prend
          # ~10s de plus mais le workflow passe enfin.

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Syntax check inline scripts in index.html
        run: node scripts/check-inline-js.mjs
