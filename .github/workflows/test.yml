name: Tests Vitest

on:
  push:
    branches: [main, master, claude/*]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Vitest unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Syntax check inline scripts in index-test.html
        run: |
          node -e "
          const fs = require('fs');
          const html = fs.readFileSync('index-test.html', 'utf8');
          const re = /<script(?![^>]*\bsrc=)[^>]*>([\s\S]*?)<\/script>/g;
          let m, ok = 0, errors = 0;
          while ((m = re.exec(html)) !== null) {
            const code = m[1].trim();
            if (!code || code.startsWith('window._BAIL_PDF_LIBS')) continue;
            try { new Function(code); ok++; }
            catch(e) { console.error('Block syntax error:', e.message); errors++; }
          }
          console.log('Inline blocks valid:', ok);
          if (errors > 0) process.exit(1);
          "
