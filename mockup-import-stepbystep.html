<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ImmoTrack — Import bancaire : compléter pas à pas (Flux A / B)</title>
<style>
  :root[data-theme="light"]{
    --bg:#f1f5f9; --card:#ffffff; --t1:#0f172a; --t2:#334155; --t3:#64748b;
    --bd:#e2e8f0; --bd2:#cbd5e1; --inp:#ffffff; --pri:#2563eb; --pri-bg:#eff6ff;
    --ok:#059669; --ok-bg:#ecfdf5; --ora:#d97706; --ora-bg:#fffbeb; --vio:#7c3aed; --vio-bg:#f5f3ff;
    --red:#dc2626; --red-bg:#fef2f2; --shadow:0 10px 30px rgba(2,6,23,.18);
  }
  :root[data-theme="dark"]{
    --bg:#0b1220; --card:#0f172a; --t1:#e2e8f0; --t2:#cbd5e1; --t3:#94a3b8;
    --bd:#1e293b; --bd2:#334155; --inp:#0b1220; --pri:#3b82f6; --pri-bg:#172554;
    --ok:#34d399; --ok-bg:#052e2b; --ora:#fbbf24; --ora-bg:#3a2c08; --vio:#a78bfa; --vio-bg:#2a1d52;
    --red:#f87171; --red-bg:#2a1012; --shadow:0 10px 30px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'IBM Plex Sans',-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--t1)}
  .mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace}

  /* ---- Barre de contrôle de la maquette (hors app) ---- */
  .mk-bar{position:sticky;top:0;z-index:50;background:#0f172a;color:#e2e8f0;display:flex;
    flex-wrap:wrap;gap:14px;align-items:center;padding:10px 16px;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
  .mk-bar b{font-family:Manrope,sans-serif;font-weight:700;color:#fff;letter-spacing:.2px}
  .mk-grp{display:flex;gap:4px;background:#1e293b;border-radius:8px;padding:3px;flex-wrap:wrap}
  .mk-grp button{border:0;background:transparent;color:#94a3b8;padding:5px 11px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
  .mk-grp button.on{background:#3b82f6;color:#fff}
  .mk-bar .lbl{color:#94a3b8;font-size:11px;text-transform:uppercase;letter-spacing:.5px}

  /* ---- Cadre device ---- */
  .mk-stage{display:flex;justify-content:center;padding:26px 12px 90px}
  .mk-wrap{width:980px;max-width:100%;transition:width .25s;position:relative}
  .mk-wrap[data-d="tab"]{width:760px}
  .mk-wrap[data-d="mob"]{width:390px}

  /* ---- Modale type app ---- */
  .modal{background:var(--card);border:1px solid var(--bd);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
  .m-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bd)}
  .m-head h3{margin:0;font-family:Manrope,sans-serif;font-size:17px}
  .m-head .sub{font-size:12px;color:var(--t3);margin-top:3px;font-weight:400;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .src-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:7px;background:var(--pri-bg);color:var(--pri)}
  .m-close{border:0;background:transparent;color:var(--t3);font-size:18px;cursor:pointer}
  .m-body{padding:18px 20px}
  .m-foot{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:14px 20px;border-top:1px solid var(--bd);background:var(--bg)}
  .m-foot .right{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}

  .fg{margin-bottom:14px}
  .fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px}
  .inp{width:100%;padding:10px 12px;border:1px solid var(--bd2);border-radius:9px;background:var(--inp);
    color:var(--t1);font-size:14px;font-family:inherit}
  .inp:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px var(--pri-bg)}
  select.inp{cursor:pointer}
  .mu{color:var(--t3)} .sm{font-size:12px}

  .btn{padding:10px 16px;border-radius:9px;border:1px solid var(--bd2);background:var(--card);color:var(--t1);
    font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
  .bp{background:var(--pri);border-color:var(--pri);color:#fff}
  .bs{background:transparent}
  .btn:disabled{opacity:.45;cursor:not-allowed}

  /* ====================================================================
     ÉCRAN RÉCAP D'IMPORT (Flux B) — la liste à onglets qui existe déjà
     ==================================================================== */
  .imp-meta{font-size:13px;color:var(--t2);margin-bottom:14px;line-height:1.5}
  .imp-stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .stat{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;padding:5px 11px;border-radius:20px;border:1px solid var(--bd2);background:var(--card);color:var(--t2)}
  .stat b{font-family:Manrope,sans-serif}
  .stat.todo{border-color:var(--ora);color:var(--ora);background:var(--ora-bg)}
  .stat.ok{border-color:var(--ok);color:var(--ok);background:var(--ok-bg)}
  .stat.dup{border-color:var(--bd2)}
  .scope-band{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--pri-bg);border:1px solid var(--pri);
    border-radius:10px;padding:9px 13px;font-size:12.5px;color:var(--pri);font-weight:600;margin-bottom:14px}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--bd);margin-bottom:12px;flex-wrap:wrap}
  .tabs button{border:0;background:transparent;color:var(--t3);padding:9px 14px;cursor:pointer;font-size:13px;font-weight:700;
    border-bottom:2px solid transparent;display:flex;align-items:center;gap:6px}
  .tabs button.on{color:var(--pri);border-bottom-color:var(--pri)}
  .tabs .badge{font-size:11px;font-weight:800;padding:1px 7px;border-radius:10px;background:var(--bg);color:var(--t2)}
  .tabs button.on .badge{background:var(--pri);color:#fff}

  /* ligne de mouvement dans la liste — 2 lignes, lisible sans ouvrir */
  .row{display:flex;align-items:center;gap:12px;padding:11px 12px;border:1px solid var(--bd);border-radius:11px;
    margin-bottom:8px;background:var(--card);cursor:pointer;border-left-width:3px;transition:box-shadow .12s,transform .04s}
  .row:hover{box-shadow:0 4px 14px rgba(2,6,23,.08)}
  .row:active{transform:translateY(1px)}
  .row.cr{border-left-color:var(--ok)} .row.db{border-left-color:var(--red)}
  .row .ic{font-size:18px;flex:0 0 auto;width:22px;text-align:center}
  .row .mid{flex:1;min-width:0}
  .row .l1{display:flex;align-items:baseline;gap:10px;justify-content:space-between}
  .row .lib{font-size:13.5px;font-weight:600;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .amt{font-family:Manrope,sans-serif;font-weight:800;font-size:14px;flex:0 0 auto}
  .row .amt.cr{color:var(--ok)} .row .amt.db{color:var(--red)}
  .row .l2{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap}
  .row .cat{font-size:12px;color:var(--t2);font-weight:600}
  .row .cat.empty{color:var(--ora);font-style:italic;font-weight:600}
  .chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:7px;background:var(--bg);border:1px solid var(--bd2);color:var(--t2)}
  .chip.bien{background:var(--pri-bg);border-color:transparent;color:var(--pri)}
  .chip.conf{background:var(--ok-bg);border-color:transparent;color:var(--ok)}
  .chip.todo{background:var(--ora-bg);border-color:transparent;color:var(--ora)}
  .chip.dup{background:var(--bg);color:var(--t3)}
  .row .go{flex:0 0 auto;color:var(--t3);font-size:18px}
  .row.done{opacity:.6}
  .row.done .go{color:var(--ok)}

  .cta-complete{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
    background:var(--ora-bg);border:1px solid var(--ora);border-radius:12px;padding:13px 16px;margin:4px 0 14px}
  .cta-complete .txt{font-size:13px;color:var(--t1);font-weight:600}
  .cta-complete .txt small{display:block;font-weight:400;color:var(--t2);margin-top:2px}

  /* ====================================================================
     FENÊTRE « Renseigner ce mouvement » (réutilise affectation.html)
     ==================================================================== */
  .overlay{position:fixed;inset:0;background:rgba(2,6,23,.55);display:flex;align-items:flex-start;
    justify-content:center;padding:24px 14px;z-index:80;overflow:auto}
  .win{width:820px;max-width:100%}
  /* progression de l'import en tête de fenêtre */
  .prog{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--bd);
    border-bottom:0;border-radius:14px 14px 0 0;padding:12px 18px}
  .prog .step{font-family:Manrope,sans-serif;font-weight:800;font-size:14px;white-space:nowrap}
  .prog .bar{flex:1;height:8px;border-radius:5px;background:var(--bd);overflow:hidden}
  .prog .bar > i{display:block;height:100%;background:var(--pri);width:0;transition:width .25s}
  .prog .dots{display:flex;gap:4px;flex-wrap:wrap}
  .prog .dot{width:9px;height:9px;border-radius:50%;background:var(--bd2)}
  .prog .dot.done{background:var(--ok)} .prog .dot.cur{background:var(--pri);box-shadow:0 0 0 3px var(--pri-bg)}
  .win .modal{border-radius:0 0 16px 16px}

  /* bandeau reconnu / à compléter sous l'en-tête */
  .recobn{display:flex;align-items:center;gap:9px;padding:9px 13px;border-radius:10px;font-size:12.5px;font-weight:600;margin-bottom:14px}
  .recobn.ok{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok)}
  .recobn.todo{background:var(--ora-bg);color:var(--ora);border:1px solid var(--ora)}

  /* Bascule Affecter / Découper */
  .mode{display:flex;gap:8px;margin:2px 0 14px}
  .mode button{flex:1;border:1px solid var(--bd2);background:var(--card);color:var(--t2);border-radius:10px;
    padding:11px 10px;cursor:pointer;font-size:13px;font-weight:700;display:flex;align-items:center;
    justify-content:center;gap:7px;line-height:1.2}
  .mode button .e{font-size:16px}
  .mode button small{display:block;font-weight:500;color:var(--t3);font-size:10.5px;margin-top:1px}
  .mode button.on{border-color:var(--pri);background:var(--pri-bg);color:var(--pri)}
  .mode button.on small{color:var(--pri)}

  /* Zone affectation adaptative */
  .aff-box{border:1px solid var(--bd);border-radius:12px;padding:14px;background:var(--bg);margin-top:4px}
  .aff-q{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:10px;display:flex;align-items:center;gap:7px}
  .aff-q .ic{font-size:16px}
  .lvl{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
  .lvl button{flex:1;min-width:90px;border:1px solid var(--bd2);background:var(--card);color:var(--t2);
    border-radius:9px;padding:9px 8px;cursor:pointer;font-size:12.5px;font-weight:600;display:flex;
    flex-direction:column;align-items:center;gap:3px;line-height:1.2}
  .lvl button .e{font-size:17px}
  .lvl button.on{border-color:var(--pri);background:var(--pri-bg);color:var(--pri)}
  .lvl button.sugg::after{content:'suggéré';font-size:9px;font-weight:700;color:var(--ok);
    background:var(--ok-bg);padding:1px 5px;border-radius:6px;margin-top:2px}
  .recup{margin-top:11px;border-top:1px dashed var(--bd2);padding-top:11px}
  .recup label.cbx{display:flex;align-items:flex-start;gap:9px;cursor:pointer;font-weight:600;color:var(--t2);font-size:13px}
  .recup input{margin-top:2px;width:16px;height:16px;accent-color:var(--vio)}
  .recup .hint{font-size:11.5px;color:var(--t3);font-weight:400;margin-top:2px}
  .cc-pick{margin-top:10px}

  .dest{margin-top:14px;border-radius:11px;padding:12px 14px;display:flex;gap:11px;align-items:flex-start;
    font-size:13px;border:1px solid transparent}
  .dest .ic{font-size:20px;line-height:1}
  .dest .ttl{font-weight:700;font-size:13.5px;margin-bottom:2px}
  .dest .det{font-size:12px;opacity:.9}
  .dest.tax{background:var(--ok-bg);border-color:var(--ok)}
  .dest.recu{background:var(--vio-bg);border-color:var(--vio)}
  .dest.none{background:var(--bg);border-color:var(--bd2)}
  .dest .ttl,.dest .det{color:var(--t1)}

  /* Panneau Découper (split) */
  .sp-help{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
  .sp-help button{border:1px solid var(--bd2);background:var(--card);color:var(--t2);border-radius:20px;
    padding:7px 13px;cursor:pointer;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:6px}
  .sp-help button.on{border-color:var(--vio);background:var(--vio-bg);color:var(--vio)}
  .sp-help .e{font-size:14px}
  .sp-hint{font-size:11.5px;color:var(--t3);margin:-4px 0 12px;line-height:1.45}
  .sp-card{border:1px solid var(--bd);border-radius:11px;padding:10px;margin-bottom:9px;background:var(--card)}
  .sp-card-top{display:flex;gap:7px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
  .sp-card .inp{padding:7px 9px;font-size:12.5px}
  .sp-card-top .lib{flex:1;min-width:90px}
  .sp-card-top .mt{width:104px;text-align:right;flex:0 0 auto}
  .sp-card-top .x{background:none;border:none;cursor:pointer;color:var(--red);font-size:15px;padding:0 2px}
  .sens-tg{display:flex;border:1px solid var(--bd2);border-radius:8px;overflow:hidden;flex:0 0 auto}
  .sens-tg button{border:0;background:var(--card);color:var(--t3);padding:7px 9px;cursor:pointer;font-size:11px;font-weight:700;white-space:nowrap}
  .sens-tg button.db.on{background:var(--red);color:#fff}
  .sens-tg button.cr.on{background:var(--ok);color:#fff}
  .sp-card-aff{display:grid;grid-template-columns:1fr auto 1fr;gap:7px;align-items:center}
  .niv-mini{display:flex;gap:3px}
  .niv-mini button{border:1px solid var(--bd2);background:var(--card);color:var(--t3);border-radius:7px;padding:6px 9px;cursor:pointer;font-size:14px;line-height:1}
  .niv-mini button.on{border-color:var(--pri);background:var(--pri-bg);color:var(--pri)}
  .niv-mini button.sugg{box-shadow:inset 0 -2px 0 var(--ok)}
  .sp-dest{text-align:right;margin-top:8px}
  .sp-add{border:1px dashed var(--bd2);background:transparent;color:var(--t2);border-radius:9px;width:100%;padding:8px;cursor:pointer;font-size:12.5px;font-weight:600;margin-top:3px}
  .sp-bal{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px;padding:11px 14px;border-radius:10px;background:var(--bg);border:1px solid var(--bd);font-size:13px}
  .sp-bal .ok{color:var(--ok);font-weight:700} .sp-bal .ko{color:var(--red);font-weight:700}
  .sp-bar{height:7px;border-radius:5px;background:var(--bd);overflow:hidden;margin-top:9px}
  .sp-bar > i{display:block;height:100%;background:var(--vio);width:0;transition:width .2s}
  .sp-bar.full > i{background:var(--ok)}
  .rdest{font-size:10.5px;font-weight:700;padding:3px 7px;border-radius:6px;white-space:nowrap;display:inline-block}
  .rdest.t{background:var(--ok-bg);color:var(--ok)} .rdest.r{background:var(--vio-bg);color:var(--vio)}
  .rdest.n{background:var(--bg);color:var(--t3);border:1px solid var(--bd2)}

  /* picker logement scopé + cherchable */
  .combo{position:relative}
  .combo-btn{display:flex;justify-content:space-between;align-items:center;gap:6px;text-align:left;cursor:pointer;width:100%}
  .combo-btn .cv{color:var(--t3);flex:0 0 auto}
  .combo-btn .lab{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .combo-pop{margin:8px 0 2px;background:var(--bg);border:1px solid var(--bd2);border-radius:10px;padding:8px;max-height:240px;overflow:auto}
  .combo-search{width:100%;padding:8px 10px;border:1px solid var(--bd2);border-radius:8px;background:var(--inp);color:var(--t1);font-size:13px;font-family:inherit}
  .combo-search:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px var(--pri-bg)}
  .combo-count{font-size:10.5px;color:var(--t3);font-weight:600;margin:7px 2px 2px}
  .combo-grp{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--t2);font-weight:700;margin:7px 2px 3px;border-top:1px solid var(--bd);padding-top:6px}
  .combo-opt{display:block;width:100%;text-align:left;border:0;background:transparent;color:var(--t1);padding:7px 9px;border-radius:7px;cursor:pointer;font-size:13px}
  .combo-opt:hover{background:var(--pri-bg);color:var(--pri)}
  .combo-more{font-size:11.5px;color:var(--t3);padding:6px 9px}

  /* Autres options repliable */
  .opts{margin-top:16px;border-top:1px solid var(--bd);padding-top:6px}
  .opts > summary{cursor:pointer;font-size:12.5px;font-weight:700;color:var(--t2);list-style:none;display:flex;align-items:center;gap:7px;padding:8px 0}
  .opts > summary::-webkit-details-marker{display:none}
  .opts > summary .chev{transition:transform .2s;color:var(--t3)}
  .opts[open] > summary .chev{transform:rotate(90deg)}
  .opt-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .file-btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--bd2);background:var(--card);border-radius:9px;padding:7px 12px;font-size:12.5px;font-weight:600;color:var(--t2);cursor:pointer}

  /* écran de fin */
  .done-card{text-align:center;padding:34px 24px}
  .done-card .big{font-size:46px}
  .done-card h2{font-family:Manrope,sans-serif;margin:10px 0 6px;font-size:22px}
  .done-card p{color:var(--t2);font-size:14px;margin:0 0 18px}
  .done-sum{display:inline-flex;gap:18px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
  .done-sum .b{font-family:Manrope,sans-serif;font-weight:800;font-size:20px;display:block}

  .note{font-size:11.5px;color:var(--t3);margin-top:9px;line-height:1.45}

  @media(max-width:520px){
    .fg2{grid-template-columns:1fr}
    .sp-card-aff{grid-template-columns:1fr}
    .niv-mini{justify-content:flex-start}
    .m-foot{flex-direction:column;align-items:stretch}
    .m-foot .right{justify-content:stretch}
    .m-foot .right .btn{flex:1}
  }
</style>
</head>
<body>

<div class="mk-bar">
  <b>🏦 Import → compléter pas à pas</b>
  <span class="lbl">Flux</span>
  <div class="mk-grp" id="g-flux">
    <button data-f="B" class="on">B · Liste + fenêtre (reco)</button>
    <button data-f="A">A · Assistant plein écran</button>
  </div>
  <span class="lbl">Format</span>
  <div class="mk-grp" id="g-device">
    <button data-d="pc" class="on">💻 Ordi</button>
    <button data-d="tab">📱 Tablette</button>
    <button data-d="mob">📲 Tél</button>
  </div>
  <span class="lbl">Thème</span>
  <div class="mk-grp" id="g-theme">
    <button data-t="light" class="on">☀️ Clair</button>
    <button data-t="dark">🌙 Sombre</button>
  </div>
</div>

<div class="mk-stage">
 <div class="mk-wrap" data-d="pc">
   <div id="screen"><!-- liste (Flux B) ou assistant (Flux A) --></div>
 </div>
</div>
<div id="overlay-host"></div>

<script>
/* =====================================================================
   Données démo (modèle réel : entités>immeubles>logements + compteurs)
   ===================================================================== */
const ENT = [
  { nom:'SCI Keller', type:'SCI', imms:[
      { nom:'Freyming', logs:[
          {ref:'F-RDC', loc:'Pierre Martin', hc:480, ch:60},
          {ref:'F-101', loc:'Marie Durand',  hc:560, ch:60},
          {ref:'F-102', loc:'Karim Aziz',    hc:520, ch:50},
      ], ccs:[ {nom:'Eau froide générale', cle:'tantièmes'}, {nom:'Ascenseur', cle:'1/N parts égales'} ] },
      { nom:'Forbach Centre', logs:[ {ref:'FB-01', loc:'Léa Bernard', hc:620, ch:80} ], ccs:[] },
  ]},
  { nom:'SCI Patrimoine', type:'SCI', imms:[
      { nom:'Metz Gare', logs:[ {ref:'MZ-3A', loc:'Jean Petit', hc:700, ch:90} ], ccs:[] },
  ]},
];
const CATMETA = {
  'Loyers encaissés':                         {l:'211', t:'recette', niv:'log', icon:'🏠'},
  'Recettes diverses (parking, antennes…)':   {l:'213', t:'recette', niv:'imm', icon:'➕'},
  'Frais de gestion / honoraires / compta':   {l:'221', t:'charge',  niv:'imm', icon:'🧮'},
  "Primes d'assurance PNO":                   {l:'223', t:'charge',  niv:'imm', icon:'🛡️'},

const walkIds = () => QUEUE.filter(m=>m.state==='todo').map(m=>m.id)
                 .concat(QUEUE.filter(m=>m.state==='ok').map(m=>m.id));

let mode = 'aff';          // 'aff' | 'split'
let activeTab = 'todo';

const $ = id => document.getElementById(id);
const fmt = n => (Math.round(n*100)/100).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
const sfmt = n => (n>=0?'+':'−')+fmt(Math.abs(n));
const mvById = id => QUEUE.find(m=>m.id===id);
const isCr = m => m.cr>0;
const net = m => m.cr - m.db;
const catMeta = name => CATMETA[name] || {l:'',t:'charge',niv:'log',icon:'🧾'};
const findImm = nom => { for(const e of ENT){ const i=e.imms.find(x=>x.nom===nom); if(i)return i; } return null; };
const allLogs = () => ENT.flatMap(e=>e.imms.flatMap(i=>i.logs.map(l=>({...l,imm:i.nom,ent:e.nom}))));
const allImms = () => ENT.flatMap(e=>e.imms.map(i=>({nom:i.nom,ent:e.nom})));

/* ====================== ÉCRAN LISTE (Flux B) ====================== */
function rowHtml(m){
  const cm = catMeta(m.cat);
  const cr = isCr(m);
  const accent = cr?'cr':'db';
  const icon = m.cat ? cm.icon : (cr?'💰':'💳');
  let catTxt = m.cat ? `<span class="cat">${m.cat}</span>` : `<span class="cat empty">À catégoriser</span>`;
  let chips = '';
  if(m.done){ chips += `<span class="chip conf">✓ Validé</span>`; }
  else if(m.state==='ok'){ chips += `<span class="chip conf">✨ Reconnu ${m.conf}%</span>`; }
  else if(m.state==='todo'){ chips += `<span class="chip todo">À compléter</span>`; }
  else if(m.state==='dup'){ chips += `<span class="chip dup">⊘ Doublon</span>`; }
  if(m.cat && m.cible){ const e = m.niv==='log'?'🚪':m.niv==='sci'?'🏛️':'🏢'; chips += `<span class="chip bien">${e} ${m.cible}</span>`; }
  if(m.suggestSplit){ chips += `<span class="chip">✂️ à découper</span>`; }
  return `<div class="row ${accent}${m.done?' done':''}" onclick="openMv(${m.id})">
    <span class="ic">${icon}</span>
    <div class="mid">
      <div class="l1"><span class="lib mono">${m.lib}</span><span class="amt ${accent}">${sfmt(net(m))}</span></div>
      <div class="l2">${catTxt}${chips}</div>
    </div>
    <span class="go">${m.done?'✓':'›'}</span>
  </div>`;
}

/* ====================== MARCHE PAS-À-PAS ====================== */
let walkList = [];   // ids dans l'ordre de la marche
let walkPos = 0;
function startWalk(kind){
  walkList = kind==='ok' ? QUEUE.filter(m=>m.state==='ok').map(m=>m.id)
           : kind==='all' ? walkIds()
           : QUEUE.filter(m=>m.state==='todo' && !m.done).map(m=>m.id);
  if(!walkList.length){ walkList = walkIds(); }
  walkPos = 0;
  openWalkAt(0);
}
function openWalkAt(pos){
  walkPos = pos;
  curId = walkList[pos];
  initCur(curId);
  renderWindow();
}
function openMv(id){
  // clic direct dans la liste : marche démarrée sur l'ensemble (todo+ok), positionnée sur cette ligne
  const m = mvById(id);
  if(m.state==='dup'){ renderDupWindow(id); return; }
  walkList = walkIds();
  walkPos = Math.max(0, walkList.indexOf(id));
  curId = id; initCur(id); renderWindow();
}
function initCur(id){
  const m = mvById(id);
  mode = m.suggestSplit ? 'split' : 'aff';
  spMethod = m.suggestSplit || 'manuel';
  combo = null;
  cur = { niv:m.niv, ent:'SCI Keller', imm:(m.niv==='imm'?m.cible:'Freyming'),
          log:(m.niv==='log'?m.cible:'F-RDC'), recup:false, _catLock:(m.cat||''),
          cat:m.cat||'' };
  if(mode==='split') seedSplit(spMethod, m);
}

function closeWindow(){ curId=null; $('overlay-host').innerHTML=''; renderScreen(); }

function renderWindow(){
  const m = mvById(curId);

    return `<span class="dot ${c}"></span>`;

  const reco = m.state==='ok';
  $('overlay-host').innerHTML = `
   <div class="overlay">
    <div class="win">
      <div class="prog">
        <span class="step">${reco?'Vérifier':'Renseigner'} ${pos} / ${total}</span>
        <div class="bar"><i style="width:${pct}%"></i></div>

      </div>
      <div class="modal">
        <div class="m-head">
          <div>
            <h3>${reco?'Vérifier ce mouvement':'Renseigner ce mouvement'}</h3>
            <div class="sub"><span class="src-pill">🏦 Import banque</span> <span class="chip bien">🏢 ${ACCT.scope.cible}</span> Relevé ${ACCT.label} · ${m.date.split('-').reverse().join('/')}</div>
          </div>
          <button class="m-close" onclick="closeWindow()">✕</button>
        </div>
        <div class="m-body">
          <div class="recobn ${reco?'ok':'todo'}">${reco
            ? `✨ Reconnu automatiquement (${m.conf}%) — vérifie et corrige si besoin.`
            : `📝 À renseigner — choisis la catégorie, l'app pose la bonne question.`}</div>

          <div class="fg2">
            <div class="fg"><label>Date</label><input class="inp" type="date" value="${m.date}"></div>
            <div class="fg">

          </div>

          <div class="mode" id="modesw">

            <button data-m="split" class="${mode==='split'?'on':''}" onclick="setMode('split')"><span class="e">✂️</span><span>Découper en lignes<small>plusieurs biens / locataires</small></span></button>

            <div class="opt-line"><label style="margin:0;min-width:90px">📎 Justificatif</label><span class="file-btn">📁 Choisir un fichier</span><span class="mu sm">Aucun document</span></div>
            <div class="opt-line"><label style="margin:0;min-width:90px">🔁 Récurrence</label><select class="inp" style="flex:1;min-width:120px"><option>Aucune (ponctuel)</option><option>Tous les mois</option><option>Tous les trimestres</option><option>Tous les ans</option></select></div>
          </details>

          <div class="right">
            <button class="btn bs" onclick="skipStep()">Passer</button>

        </div>

   </div>`;
  render();
}
function catOptions(sel){
  const ph = sel ? '' : `<option value="" selected disabled>— Choisir une catégorie —</option>`;
  const groups = {
    'Recettes':['Loyers encaissés','Recettes diverses (parking, antennes…)','Provision de charges (locataire)'],
    'Charges déductibles (impôts)':['Frais de gestion / honoraires / compta',"Primes d'assurance PNO","Travaux de réparation et d'entretien",'Taxe foncière (et taxes annexes)','Charges de copropriété'],
    'Charges récupérables (immeuble)':['Eau froide générale (immeuble)'],
    'Prêt':['Prêt',"Prêt — Intérêts d'emprunt"],
    'Hors déclaration':['Divers (non déductible)'],
  };
  return ph + Object.entries(groups).map(([g,arr])=>`<optgroup label="${g}">`+
    arr.map(c=>`<option ${c===sel?'selected':''}>${c}</option>`).join('')+`</optgroup>`).join('');
}

function prevStep(){ if(walkPos>0) openWalkAt(walkPos-1); }
function skipStep(){ goNext(); }
function validateNext(){
  const m = mvById(curId);
  m.cat = $('cat').value; m.lib = $('lib').value;
  m.niv = cur.niv; m.cible = cur.niv==='log'?cur.log:cur.niv==='sci'?cur.ent:cur.imm;
  m.done = true;
  if(m.state==='ok'){ /* reconnu confirmé, reste 'ok' */ }
  goNext();
}
function goNext(){
  if(walkPos < walkList.length-1){ openWalkAt(walkPos+1); }
  else { renderDoneWindow(); }
}
function renderDoneWindow(){
  const done = QUEUE.filter(m=>m.done).length;
  const ok   = QUEUE.filter(m=>m.state==='ok').length;
  const todo = QUEUE.filter(m=>m.state==='todo').length;
  $('overlay-host').innerHTML = `

         <span><span class="b" style="color:var(--ok)">${ok}</span>reconnus</span>
         <span><span class="b">${todo+ok}</span>à importer</span>

     </div>
   </div></div></div>`;

function renderDupWindow(id){

/* ====================== MODE AFFECTER (de affectation.html) ====================== */

function metaCur(){ return catMeta($('cat')?$('cat').value:cur.cat); }
function renderAff(){
  const selCat = $('cat')?$('cat').value:cur.cat;
  if(!selCat){
    return `<div class="aff-box"><div class="aff-q"><span class="ic">👆</span>Commence par la catégorie ci-dessus</div>`
      + `<div class="note" style="margin:0">Dès que tu choisis <b>ce que c'est</b>, l'app pose <b>une seule</b> question (logement / immeuble / SCI) et t'affiche où ça atterrit dans ta 2044.</div></div>`;
  }
  const m = metaCur();
  if(cur._catLock !== selCat){ cur.niv=m.niv; cur.recup=!!m.recup; cur._catLock=selCat; }
  const niv = cur.niv || m.niv;
  let h = `<div class="aff-box"><div class="aff-q"><span class="ic">${NIV_LBL[niv].e}</span>`;
  h += niv==='log' ? 'Quel logement&nbsp;?' : niv==='imm' ? 'Quel immeuble&nbsp;?' : 'Quelle entité / SCI&nbsp;?';
  h += `</div><div class="lvl">`;
  ['sci','imm','log'].forEach(k=>{
    const on = k===niv?' on':''; const sg=(k===m.niv && k!==niv)?' sugg':'';
    h += `<button class="${on}${sg}" onclick="cur.niv='${k}';render()"><span class="e">${NIV_LBL[k].e}</span>${NIV_LBL[k].l}</button>`;
  });
  h += `</div>`;
  if(niv==='sci') h += `<select class="inp" onchange="cur.ent=this.value;render()">`+ENT.map(e=>`<option${e.nom===cur.ent?' selected':''}>${e.nom}</option>`).join('')+`</select>`;
  if(niv==='imm') h += `<select class="inp" onchange="cur.imm=this.value;render()">`+allImms().map(i=>`<option${i.nom===cur.imm?' selected':''}>${i.nom}</option>`).join('')+`</select>`;
  if(niv==='log') h += `<div class="combo">`+comboBtn('aff', cur.log)+(combo&&combo.key==='aff'?comboPanel():'')+`</div>`;
  if(niv==='imm' && (m.t==='charge') && m.recupable){
    const im=findImm(cur.imm);
    if(im && im.ccs.length) h += `<div class="recup"><label class="cbx"><input type="checkbox" ${cur.recup?'checked':''} onchange="cur.recup=this.checked;render()"><span>Cette charge se récupère sur les locataires<span class="hint">→ je la répartis via un compteur collectif au lieu de la déduire aux impôts</span></span></label></div>`;
  }
  if(m.t==='recup' || (cur.recup && niv==='imm')){
    const im=findImm(cur.imm);
    if(im && im.ccs.length) h += `<div class="cc-pick"><label>Compteur collectif</label><select class="inp">`+im.ccs.map(c=>`<option>${c.nom} · clé ${c.cle}</option>`).join('')+`</select></div>`;
  }
  h += destHtml(m, niv) + `</div>`;
  return h;
}
function destHtml(m, niv){
  const recup=(m.t==='recup')||(cur.recup&&niv==='imm');
  if(recup){
    const im=findImm(cur.imm); const nLoc=im?im.logs.length:0; const cc=(im&&im.ccs[0])||{nom:'—',cle:'tantièmes'};
    return `<div class="dest recu"><span class="ic">👥</span><div><div class="ttl">Réparti sur ${nLoc} locataire(s) de ${cur.imm}</div><div class="det">Compteur « ${cc.nom} » · clé ${cc.cle} → régularisation des charges. <span class="mu">Pas sur ta 2044 (ça se neutralise).</span></div></div></div>`;
  }
  if(m.t==='special') return `<div class="dest none"><span class="ic">📋</span><div><div class="ttl">Hors déclaration 2044</div><div class="det">${$('cat')&&$('cat').value==='Prêt'?'Capital remboursé — n\'entre pas dans le résultat foncier (sépare les intérêts via « Découper »).':'N\'entre pas dans le résultat foncier.'}</div></div></div>`;
  if(!m.l) return `<div class="dest none"><span class="ic">📋</span><div><div class="ttl">Hors déclaration</div><div class="det">N'entre pas dans le résultat foncier.</div></div></div>`;
  const where = niv==='sci'?`🏛️ ${cur.ent}`:niv==='imm'?`🏢 ${cur.imm}`:`🚪 ${cur.log}`;
  const s = m.t==='recette'?'Recette':m.t==='interet'?'Intérêts déductibles':'Charge déductible';
  return `<div class="dest tax"><span class="ic">🧾</span><div><div class="ttl">Ta déclaration 2044 · ligne ${m.l} — ${LIG_LBL[m.l]||''}</div><div class="det">${s} · rattaché à ${where}.${niv==='imm'?' Comptée au total de l\'immeuble.':''}</div></div></div>`;
}

/* ====================== MODE DÉCOUPER ====================== */
function defCible(k){ return k==='sci'?(cur.ent||ENT[0].nom):k==='imm'?(cur.imm||'Freyming'):(cur.log||allLogs()[0].ref); }
function setRowSens(j,s){ spRows[j].sens=s; renderSplit(); }
function setRowNiv(j,k){ combo=null; const r=spRows[j]; r.niv=k; r.cible=defCible(k); renderSplit(); }
function setRowCat(j,v){ combo=null; const r=spRows[j]; r.cat=v; const cm=CATMETA[v]||{};
  if(cm.niv){ r.niv=cm.niv; r.cible=defCible(cm.niv); } r.sens=(cm.t==='recette')?'cr':'db'; renderSplit(); }
function nivMini(j){ const r=spRows[j]; const sug=(CATMETA[r.cat]||{}).niv;
  return `<div class="niv-mini">`+['sci','imm','log'].map(k=>`<button class="${k===r.niv?'on':''}${(k===sug&&k!==r.niv)?' sugg':''}" title="${NIV_LBL[k].l}" onclick="setRowNiv(${j},'${k}')">${NIV_LBL[k].e}</button>`).join('')+`</div>`; }
function cibleSelect(j){ const r=spRows[j];
  const opts = r.niv==='sci'?ENT.map(e=>[e.nom,e.nom]):r.niv==='imm'?allImms().map(i=>[i.nom,i.nom]):allLogs().map(l=>[l.ref,l.ref+' · '+l.loc]);
  return `<select class="inp" onchange="spRows[${j}].cible=this.value;renderSplit()">`+opts.map(([v,t])=>`<option value="${v}" ${v===r.cible?'selected':''}>${t}</option>`).join('')+`</select>`; }
function rowDest(r){ const cm=CATMETA[r.cat]||{l:'',t:'charge'};
  const where=r.niv==='sci'?`🏛️ ${r.cible}`:r.niv==='imm'?`🏢 ${r.cible}`:`🚪 ${r.cible}`;
  if(cm.t==='recup') return `<span class="rdest r">→ compteur · ${where}</span>`;
  if(cm.regul) return `<span class="rdest r">→ régularisation · ${where}</span>`;
  if(cm.t==='special') return `<span class="rdest n">→ hors 2044 · ${where}</span>`;
  if(cm.l){ const s=cm.t==='recette'?'recette':cm.t==='interet'?'intérêts':'charge'; return `<span class="rdest t">→ 2044·${cm.l} · ${s} · ${where}</span>`; }
  return `<span class="rdest n">→ hors 2044</span>`; }
const logByRef = ref => allLogs().find(x=>x.ref===ref);
function logLabel(ref){ const l=logByRef(ref); return l?`${l.ref} — ${l.loc}`:(ref||'Choisir un logement…'); }
function comboBtn(key, ref){ return `<button type="button" class="inp combo-btn" onclick="toggleCombo('${key}')"><span class="lab">${logLabel(ref)}</span><span class="cv">▾</span></button>`; }
function comboPanel(){ return `<div class="combo-pop"><input class="combo-search" id="combosearch" placeholder="🔍 Réf. ou nom du locataire…" oninput="combo.q=this.value;fillComboList()"><div id="combolist"></div></div>`; }
function toggleCombo(key){ combo=(combo&&combo.key===key)?null:{key,q:''}; render(); if(combo) setTimeout(()=>{const s=$('combosearch');if(s)s.focus();fillComboList();},0); }
function fillComboList(){ if(!combo) return; const q=(combo.q||'').toLowerCase().trim(); const scope=cur.imm;
  const filt=allLogs().filter(l=>(`${l.ref} ${l.loc} ${l.imm}`).toLowerCase().includes(q));
  const byImm={}; filt.forEach(l=>{(byImm[l.imm]=byImm[l.imm]||[]).push(l);});
  const imms=Object.keys(byImm).sort((a,b)=>a===scope?-1:b===scope?1:a.localeCompare(b,'fr',{numeric:true}));
  let h=`<div class="combo-count">${filt.length} logement(s)${q?` pour « ${combo.q} »`:` · immeuble du mouvement en premier`}</div>`;
  if(!filt.length) h+=`<div class="combo-more">Aucun résultat</div>`;
  imms.forEach(im=>{ h+=`<div class="combo-grp">${im===scope?'📍 ':''}${im} <span class="mu">(${byImm[im].length})</span></div>`;
    byImm[im].slice(0,30).forEach(l=>{h+=`<button type="button" class="combo-opt" onclick="chooseLog('${l.ref}')"><b>${l.ref}</b> — ${l.loc}</button>`;});
    if(byImm[im].length>30) h+=`<div class="combo-more">+ ${byImm[im].length-30} autres — précise ta recherche</div>`; });
  const el=$('combolist'); if(el) el.innerHTML=h; }
function chooseLog(ref){ if(!combo) return; const key=combo.key; combo=null;
  if(key==='aff'){ cur.log=ref; render(); } else { const j=+key.split(':')[1]; if(spRows[j]) spRows[j].cible=ref; renderSplit(); } }

function seedSplit(method, mv){
  spMethod=method; const m = mv || mvById(curId);
  const im=findImm(cur.imm)||ENT[0].imms[0];
  if(method==='bail'){
    const l=im.logs.find(x=>x.ref===cur.log)||im.logs[0];
    spRows=[{sens:'cr',lib:'Loyer hors charges',montant:l.hc,cat:'Loyers encaissés',niv:'log',cible:l.ref},
            {sens:'cr',lib:'Provision de charges',montant:l.ch,cat:'Provision de charges (locataire)',niv:'log',cible:l.ref}];
  } else if(method==='caf'){
    spRows=im.logs.slice(0,2).map(l=>({sens:'cr',lib:'APL '+l.loc,montant:Math.round(l.hc*0.4),cat:'Loyers encaissés',niv:'log',cible:l.ref}));
  } else if(method==='gerance'){
    const loy=im.logs.map(l=>({sens:'cr',lib:'Loyer '+l.loc,montant:l.hc,cat:'Loyers encaissés',niv:'log',cible:l.ref}));
    const brut=im.logs.reduce((s,l)=>s+l.hc,0);
    spRows=[...loy,{sens:'db',lib:'Frais de gestion 7%',montant:Math.round(brut*0.07),cat:'Frais de gestion / honoraires / compta',niv:'imm',cible:im.nom},
            {sens:'db',lib:'Assurance GLI',montant:30,cat:"Primes d'assurance PNO",niv:'imm',cible:im.nom}];
  } else if(method==='pret'){
    const ech=m?Math.abs(net(m)):780;
    spRows=[{sens:'db',lib:'Capital remboursé',montant:Math.round(ech*0.45),cat:'Prêt',niv:'imm',cible:im.nom},
            {sens:'db',lib:"Intérêts d'emprunt",montant:Math.round(ech*0.5),cat:"Prêt — Intérêts d'emprunt",niv:'imm',cible:im.nom},
            {sens:'db',lib:'Assurance emprunteur',montant:ech-Math.round(ech*0.45)-Math.round(ech*0.5),cat:"Primes d'assurance PNO",niv:'imm',cible:im.nom}];
  } else {
    const c=cur.cat,cm=CATMETA[c]||{};
    spRows=[{sens:(m&&isCr(m))?'cr':'db',lib:'Ligne 1',montant:'',cat:c,niv:cm.niv||'log',cible:cur.log},
            {sens:(m&&isCr(m))?'cr':'db',lib:'Ligne 2',montant:'',cat:c,niv:cm.niv||'log',cible:cur.log}];
  }
  if($('sp-rows')) renderSplit();
}
function renderSplit(){
  document.querySelectorAll('#sp-help button').forEach(b=>b.classList.toggle('on',b.dataset.sp===spMethod));
  const hint=$('sp-hint'); if(hint) hint.innerHTML = spMethod==='bail'
    ? "Pré-rempli depuis le bail : loyer → 2044 (211), provision de charges → régularisation locataire."
    : spMethod==='caf'?"Une ligne par locataire bénéficiaire de l'APL."
    : spMethod==='gerance'?"Relevé de gérance : loyers en <b>crédit</b> + frais en <b>débit</b>. Équilibre sur le net."
    : spMethod==='pret'?"Échéance de prêt : capital (hors 2044) + intérêts (ligne 250) + assurance. Saisis les montants depuis ton tableau d'amortissement."
    : "Chaque ligne a son sens, sa catégorie et son affectation. L'équilibre se fait sur le net.";
  const cats=Object.keys(CATMETA);
  $('sp-rows').innerHTML = spRows.map((r,j)=>`
    <div class="sp-card">
      <div class="sp-card-top">
        <div class="sens-tg"><button class="db ${r.sens==='db'?'on':''}" onclick="setRowSens(${j},'db')">− Débit</button><button class="cr ${r.sens==='cr'?'on':''}" onclick="setRowSens(${j},'cr')">+ Crédit</button></div>
        <input class="inp lib" placeholder="Libellé" value="${r.lib}" oninput="spRows[${j}].lib=this.value">
        <input class="inp mt" type="number" step="0.01" placeholder="Montant" value="${r.montant}" oninput="spRows[${j}].montant=this.value;balance()">
        ${spRows.length>1?`<button class="x" title="Supprimer" onclick="spRows.splice(${j},1);renderSplit()">✕</button>`:''}
      </div>
      <div class="sp-card-aff">
        <select class="inp" onchange="setRowCat(${j},this.value)">${cats.map(c=>`<option ${c===r.cat?'selected':''}>${c}</option>`).join('')}</select>
        ${nivMini(j)}
        ${r.niv==='log'?`<div class="combo">${comboBtn('sp:'+j,r.cible)}</div>`:cibleSelect(j)}
      </div>
      ${(combo&&combo.key==='sp:'+j)?comboPanel():''}
      <div class="sp-dest">${rowDest(r)}</div>
    </div>`).join('');
  balance();
}
function addRow(){ const c=cur.cat,cm=CATMETA[c]||{}; spRows.push({sens:'db',lib:'Ligne '+(spRows.length+1),montant:'',cat:c,niv:cm.niv||'log',cible:cur.log}); renderSplit(); }
function balance(){
  const bankNet=(parseFloat($('cr').value)||0)-(parseFloat($('db').value)||0);
  const n=spRows.reduce((s,r)=>{const v=parseFloat(r.montant)||0;return s+(r.sens==='cr'?v:-v);},0);
  const reste=Math.round((bankNet-n)*100)/100, ok=Math.abs(reste)<0.005;
  const denom=Math.abs(bankNet)||1, pct=Math.min(100,Math.round(Math.abs(n)/denom*100));
  const nf=x=>(x<0?'− ':'')+fmt(Math.abs(x));
  if($('sp-bal')) $('sp-bal').innerHTML=`<span>Net réparti : <strong>${nf(n)}</strong> · reste <span class="${ok?'ok':'ko'}">${ok?'✅ équilibré':nf(reste)}</span></span><span>Net bancaire : <strong>${nf(bankNet)}</strong></span>`;
  const bar=$('sp-bar'); if(bar){ bar.classList.toggle('full',ok); bar.firstElementChild.style.width=pct+'%'; }
  if($('save')) $('save').disabled=!ok;
  if($('foot-info')) $('foot-info').textContent= ok?'':'Le net des lignes doit égaler le net bancaire';
}

/* ====================== ASSISTANT PLEIN ÉCRAN (Flux A) ====================== */
function renderScreen(){
  if(flux==='B'){ activeTab='todo'; renderList(); }
  else { // A : pas de liste — un panneau d'amorce, puis la fenêtre prend tout
    const todo=QUEUE.filter(m=>m.state==='todo').length, ok=QUEUE.filter(m=>m.state==='ok').length;
    $('screen').innerHTML = `<div class="modal"><div class="m-head"><div><h3>🏦 Import bancaire — assistant</h3>
       <div class="sub"><span class="src-pill">🏦 Import banque</span> Relevé ${ACCT.label} · 12 lignes</div></div></div>
       <div class="m-body" style="text-align:center;padding:30px">
         <div style="font-size:40px">🧭</div>
         <h2 style="font-family:Manrope;margin:8px 0 4px">${todo+ok} mouvements à passer en revue</h2>
         <p class="mu" style="margin:0 0 18px">L'assistant t'ouvre chaque mouvement l'un après l'autre. Valide → le suivant s'ouvre.</p>
         <button class="btn bp" onclick="startWalk('all')">▶ Démarrer l'assistant</button>
         <div class="note" style="margin-top:14px">Les 3 doublons sont exclus automatiquement.</div>
       </div></div>`;
  }
}

/* ====================== contrôles maquette ====================== */
$('g-flux').onclick=e=>{const b=e.target.closest('button');if(!b)return;
  document.querySelectorAll('#g-flux button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  flux=b.dataset.f; curId=null; $('overlay-host').innerHTML=''; renderScreen();
  if(flux==='A') startWalk('all'); };
$('g-device').onclick=e=>{const b=e.target.closest('button');if(!b)return;
  document.querySelectorAll('#g-device button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  document.querySelector('.mk-wrap').dataset.d=b.dataset.d;};
$('g-theme').onclick=e=>{const b=e.target.closest('button');if(!b)return;
  document.querySelectorAll('#g-theme button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  document.documentElement.dataset.theme=b.dataset.t;};

renderScreen();
</script>
</body>
