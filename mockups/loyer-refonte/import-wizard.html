<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Import bancaire — wizard réel + 2 correctifs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<style>
[data-theme="light"]{
  --bg:#eef2f7;
  --sur:rgba(255,255,255,.93); --sur2:rgba(242,246,251,.97); --sur3:rgba(230,236,245,.8);
  --bor:rgba(0,0,0,.09); --bor2:rgba(0,0,0,.05);
  --t1:#1a2332; --t2:#5a6e87; --t3:#9aabbf;
  --grn:#16a34a; --red:#dc2626; --ora:#ea580c; --acc:#3b7ef6; --blu:#3b7ef6;
  --r:8px; --rl:14px;
  --bg-success:rgba(22,163,74,.10); --bg-danger:rgba(220,38,38,.10);
  --bg-warning:rgba(234,88,12,.12); --bg-info:rgba(59,126,246,.10);
}
[data-theme="dark"]{
  --bg:#0A0E27;
  --sur:#141a35; --sur2:#1b2244; --sur3:#232b52;
  --bor:rgba(255,255,255,.10); --bor2:rgba(255,255,255,.05);
  --t1:#e8ecf6; --t2:#9aa6c4; --t3:#6b779a;
  --grn:#10B981; --red:#EF4444; --ora:#F59E0B; --acc:#0E73F6; --blu:#0E73F6;
  --r:8px; --rl:14px;
  --bg-success:rgba(16,185,129,.14); --bg-danger:rgba(239,68,68,.14);
  --bg-warning:rgba(245,158,11,.14); --bg-info:rgba(14,115,246,.14);
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--t1);font-family:'IBM Plex Sans',system-ui,-apple-system,sans-serif}

/* barre mockup */
.mk-bar{position:sticky;top:0;z-index:50;display:flex;flex-wrap:wrap;gap:12px;align-items:center;
  padding:11px 18px;background:#0f172a;color:#e2e8f0;border-bottom:1px solid #1e293b}
.mk-bar h1{font-family:'Manrope',sans-serif;font-size:13.5px;margin:0;font-weight:800;letter-spacing:-.2px}
.mk-grp{display:flex;gap:4px;background:#1e293b;border-radius:10px;padding:3px;flex-wrap:wrap}
.mk-grp button{border:none;background:transparent;color:#94a3b8;font:inherit;font-size:12px;font-weight:600;
  padding:6px 11px;border-radius:7px;cursor:pointer;transition:.15s;white-space:nowrap}
.mk-grp button.on{background:var(--acc);color:#fff}
.mk-grp button:not(.on):hover{color:#e2e8f0}
.mk-lbl{font-size:10.5px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.mk-note{font-size:11px;color:#94a3b8;margin-left:auto;max-width:340px;line-height:1.4}
.mk-stage{padding:24px 16px 70px;display:flex;justify-content:center}
.mk-frame{width:720px;max-width:100%;transition:width .25s ease}
.mk-frame.tab{width:680px} .mk-frame.phone{width:390px}
.mk-cap{font-size:11.5px;color:var(--t2);text-align:center;margin:0 0 14px;line-height:1.55}
.mk-cap b{color:var(--t1)} .mk-cap .fix{color:var(--ora);font-weight:700}

/* modal wizard (repris index.html) */
.modal{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rl);overflow:hidden;
  box-shadow:0 24px 64px rgba(0,0,0,.18)}
.m-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bor)}
.m-head h3{font-size:15.5px;font-weight:700;font-family:'Manrope',sans-serif;margin:0}
.m-head .mu{font-size:11.5px;color:var(--t2);margin-top:2px}
.m-close{background:none;border:none;color:var(--t2);cursor:pointer;font-size:18px;padding:4px}
.m-body{padding:18px 20px;min-height:300px}
.m-foot{padding:13px 20px;border-top:1px solid var(--bor);display:flex;justify-content:space-between;gap:8px;
  background:var(--sur2);align-items:center;flex-wrap:wrap}

.wz-step{display:flex;gap:5px;align-items:center;padding:11px 20px;background:var(--sur2);border-bottom:1px solid var(--bor);overflow-x:auto}
.wz-stp{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t3);font-weight:600;white-space:nowrap}
.wz-stp .n{width:18px;height:18px;border-radius:50%;display:grid;place-items:center;font-size:10px;background:var(--sur3);color:var(--t2);border:1px solid var(--bor)}
.wz-stp.act{color:var(--acc)} .wz-stp.act .n{background:var(--acc);color:#fff;border-color:var(--acc)}
.wz-stp.done{color:var(--grn)} .wz-stp.done .n{background:var(--grn);color:#fff;border-color:var(--grn)}
.wz-stp.skip{opacity:.45}
.wz-sep{color:var(--t3);font-size:11px}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--r);border:none;
  cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:.15s;white-space:nowrap}
.bp{background:var(--blu);color:#fff;box-shadow:0 2px 8px rgba(59,126,246,.3)}
.bs{background:var(--sur2);color:var(--t1);border:1px solid var(--bor)}
.bsm{padding:6px 11px;font-size:12px}
.inp{background:var(--sur2);border:1.5px solid var(--bor);border-radius:var(--r);color:var(--t1);
  padding:8px 11px;font-size:13px;font-family:inherit;width:100%}
.inp:focus{outline:none;border-color:var(--blu);box-shadow:0 0 0 3px rgba(59,126,246,.12)}
select.inp{cursor:pointer}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.fg>label{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.4px}

/* étape 1 dépôt */
.drop{border:2px dashed var(--bor);border-radius:var(--rl);padding:28px 20px;text-align:center;background:var(--sur2);cursor:pointer}
.drop:hover{border-color:var(--acc)}
.drop .big{font-size:34px}
.drop b{font-size:14px;display:block;margin:8px 0 3px}
.drop .mut{font-size:12px;color:var(--t2)}
.orsep{text-align:center;margin:12px 0;font-size:11.5px;color:var(--t3)}
.filechip{display:flex;align-items:center;gap:11px;background:var(--sur2);border:1px solid var(--bor);border-radius:var(--r);padding:11px 14px;margin-top:13px}
.filechip .ic{font-size:22px}
.filechip b{font-size:13px} .filechip .mut{font-size:11.5px;color:var(--t2)}
.detect{margin-left:auto;display:flex;flex-direction:column;gap:3px;align-items:flex-end;font-size:11px;text-align:right}
.detect .ok{color:var(--grn);font-weight:700}
.detect .warn{color:var(--ora);font-weight:700}

/* étape 2 mapping (CORRECTIF) */
.fixbadge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:800;background:var(--bg-warning);
  color:var(--ora);border:1px solid #fcd34d;border-radius:9px;padding:2px 9px;text-transform:uppercase;letter-spacing:.4px;vertical-align:middle}
.rescue-note{background:var(--bg-warning);border-left:3px solid var(--ora);border-radius:0 var(--r) var(--r) 0;
  padding:9px 13px;font-size:12px;color:var(--t1);line-height:1.5;margin-bottom:14px}
.rescue-note b{color:var(--ora)}
.map-grid{border:1px solid var(--bor);border-radius:var(--rl);overflow:hidden}
.map-row{display:grid;grid-template-columns:1fr 22px 1fr;align-items:center;gap:10px;padding:9px 13px;border-bottom:1px solid var(--bor2)}
.map-row:last-child{border-bottom:none}
.map-src{font-size:12.5px;font-weight:600}
.map-src .ex{font-size:11px;color:var(--t3);margin-top:1px}
.map-arr{color:var(--t3);text-align:center}
.map-preview{margin-top:14px;border:1px solid var(--bor);border-radius:var(--r);overflow:auto}
table.mini{width:100%;border-collapse:collapse;font-size:11.5px;min-width:480px}
table.mini th{background:var(--sur2);color:var(--t3);font-size:10px;text-transform:uppercase;letter-spacing:.3px;
  padding:6px 10px;text-align:left;border-bottom:1px solid var(--bor);white-space:nowrap}
table.mini td{padding:6px 10px;border-bottom:1px solid var(--bor2);white-space:nowrap}
.memo{font-size:11px;color:var(--acc);margin-top:9px;display:flex;align-items:center;gap:6px}

/* étape 3 compte */
.acct{display:flex;align-items:center;gap:11px;border:1.5px solid var(--bor);border-radius:var(--r);padding:11px 13px;margin-bottom:8px;cursor:pointer;background:var(--sur2)}
.acct.sel{border-color:var(--acc);background:var(--bg-info)}
.acct .radio{width:18px;height:18px;border-radius:50%;border:2px solid var(--bor);flex:none;display:grid;place-items:center}
.acct.sel .radio{border-color:var(--acc)}
.acct.sel .radio::after{content:"";width:9px;height:9px;border-radius:50%;background:var(--acc)}
.acct .ic{font-size:19px}
.acct b{font-size:13px} .acct .mut{font-size:11px;color:var(--t2)}
.acct .tag{margin-left:auto;font-size:10.5px;color:var(--t2);background:var(--sur);border:1px solid var(--bor);border-radius:9px;padding:2px 9px;font-weight:700}

/* étape 4 période */
.mode{display:flex;align-items:flex-start;gap:11px;border:1.5px solid var(--bor);border-radius:var(--r);padding:11px 13px;margin-bottom:8px;cursor:pointer}
.mode.sel{border-color:var(--acc);background:var(--bg-info)}
.mode .radio{width:18px;height:18px;border-radius:50%;border:2px solid var(--bor);flex:none;margin-top:1px;display:grid;place-items:center}
.mode.sel .radio{border-color:var(--acc)}
.mode.sel .radio::after{content:"";width:9px;height:9px;border-radius:50%;background:var(--acc)}
.mode b{font-size:13px} .mode .mut{font-size:11.5px;color:var(--t2);margin-top:2px;line-height:1.4}
.reprise{background:var(--bg-info);border:1px solid #bfdbfe;border-left:3px solid var(--acc);border-radius:0 var(--r) var(--r) 0;padding:10px 13px;font-size:12px;line-height:1.5}
[data-theme="dark"] .reprise{border-color:rgba(14,115,246,.4)}

/* étape 5 aperçu (CORRECTIF affectation) */
.lotbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--sur2);border:1px solid var(--bor);border-radius:var(--r);padding:10px 13px;margin-bottom:12px}
.lotbar .seg{display:flex;flex-direction:column;gap:3px}
.lotbar .k{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.4px}
.lotbar .v{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.lotbar select.inp{width:auto;min-width:170px;padding:6px 10px;font-size:12.5px}
.lotbar .hint{font-size:11px;color:var(--t2);flex-basis:100%}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:11px;font-size:11.5px}
.badge{border-radius:9px;padding:3px 10px;font-weight:700;border:1px solid var(--bor)}
.badge.tot{background:var(--sur2);color:var(--t2)}
.badge.new{background:var(--bg-success);color:var(--grn);border-color:#86efac}
.badge.dup{background:var(--sur3);color:var(--t2)}
.badge.imp{background:var(--bg-info);color:var(--acc);border-color:#bfdbfe}
.pv-wrap{border:1px solid var(--bor);border-radius:var(--rl);overflow:auto}
table.pv{width:100%;border-collapse:collapse;font-size:12px;min-width:640px}
table.pv th{background:var(--sur2);color:var(--t3);font-size:9.5px;text-transform:uppercase;letter-spacing:.3px;
  padding:7px 9px;text-align:left;border-bottom:1px solid var(--bor);white-space:nowrap}
table.pv td{padding:7px 9px;border-bottom:1px solid var(--bor2);vertical-align:middle}
table.pv tr.dup td{opacity:.5}
table.pv tr:last-child td{border-bottom:none}
.col-r{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.amt-cr{color:var(--grn);font-weight:700} .amt-db{color:var(--red);font-weight:700}
.pv select.inp{padding:4px 7px;font-size:11.5px;min-width:90px}
.bienpick{display:flex;align-items:center;gap:5px}
.immdot{width:7px;height:7px;border-radius:50%;flex:none}
.altlink{font-size:10px;color:var(--acc);cursor:pointer;white-space:nowrap}
.altlink:hover{text-decoration:underline}
.conf{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700}
.conf .dot{width:7px;height:7px;border-radius:50%}
.conf.hi{color:var(--grn)} .conf.hi .dot{background:var(--grn)}
.conf.lo{color:var(--ora)} .conf.lo .dot{background:var(--ora)}
.dupbadge{font-size:9.5px;font-weight:700;background:var(--sur3);color:var(--t2);border:1px solid var(--bor);border-radius:8px;padding:1px 7px;white-space:nowrap}
.rule-btn{border:1px solid var(--bor);background:var(--sur);border-radius:6px;padding:3px 7px;font-size:10.5px;color:var(--t2);cursor:pointer;white-space:nowrap}
.rule-btn:hover{border-color:var(--acc);color:var(--acc)}

/* étape 6 confirmation */
.conf-box{text-align:center;padding:10px 0}
.conf-box .big{font-size:46px}
.conf-box h4{font-family:'Manrope',sans-serif;font-size:18px;margin:8px 0 4px}
.conf-box .mut{font-size:12.5px;color:var(--t2)}
.conf-stats{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin:18px 0}
.conf-stat{background:var(--sur2);border:1px solid var(--bor);border-radius:var(--rl);padding:13px}
.conf-stat .n{font-family:'Manrope',sans-serif;font-size:26px;font-weight:800}
.conf-stat .l{font-size:11.5px;color:var(--t2);margin-top:2px}
.conf-stat.new .n{color:var(--grn)} .conf-stat.dup .n{color:var(--t2)}
.conf-acct{background:var(--bg-info);border:1px solid #bfdbfe;border-radius:var(--r);padding:11px 14px;font-size:12.5px;text-align:left;display:flex;align-items:center;gap:11px}
[data-theme="dark"] .conf-acct{border-color:rgba(14,115,246,.4)}
.conf-acct .ic{font-size:20px}

.mk-frame.phone .conf-stats{grid-template-columns:1fr}
.mk-frame.phone .lotbar select.inp{width:100%}
.hidden{display:none!important}
</style>
</head>
<body>

<div class="mk-bar">
  <h1>🏦 Import bancaire — wizard réel</h1>
  <span class="mk-lbl">Étape</span>
  <div class="mk-grp" id="grp-step">
    <button data-step="1" class="on">1·Dépôt</button>
    <button data-step="2">2·Colonnes ⚠</button>
    <button data-step="3">3·Compte</button>
    <button data-step="4">4·Période</button>
    <button data-step="5">5·Aperçu</button>
    <button data-step="6">6·Fini</button>
  </div>
  <span class="mk-lbl">Format</span>
  <div class="mk-grp" id="grp-fmt">
    <button data-fmt="pc" class="on">💻 PC</button>
    <button data-fmt="tab">Tab</button>
    <button data-fmt="phone">📱 Tél</button>
  </div>
  <div class="mk-grp" id="grp-theme">
    <button data-theme-btn="light" class="on">☀️</button>
    <button data-theme-btn="dark">🌙</button>
  </div>
  <p class="mk-note" id="mk-note"></p>
</div>

<div class="mk-stage">
  <div class="mk-frame" id="frame">
    <p class="mk-cap" id="cap"></p>
    <div class="modal">
      <div class="m-head">
        <div>
          <h3>🏦 Importer un relevé bancaire</h3>
          <div class="mu" id="m-sub">Étape 1 sur 6</div>
        </div>
        <button class="m-close">✕</button>
      </div>
      <div class="wz-step" id="wz-steps"></div>
      <div class="m-body" id="wz-body"></div>
      <div class="m-foot">
        <span style="font-size:11.5px;color:var(--t2)" id="wz-hint"></span>
        <div style="display:flex;gap:8px">
          <button class="btn bs" id="wz-back">‹ Retour</button>
          <button class="btn bp" id="wz-next">Continuer ›</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const S = { step:1, fmt:'pc', theme:'light' };

const STD_CATS = ['Loyers encaissés','Charges récupérables','Provisions sur charges','Régularisation de charges',
  'Dépôt de garantie','Travaux & entretien','Taxe foncière','Assurances','Frais de gestion','Intérêts d\'emprunt',
  'Honoraires & procédures','Autres recettes','Autres dépenses'];

const IMMS = [
  {id:'vh', nom:'12 rue Victor Hugo', color:'#3b7ef6', logs:[
    {ref:'A101', loc:'MARTIN'},{ref:'A102', loc:'DUBOIS'},{ref:'A103', loc:'BERNARD'}]},
  {id:'til', nom:'8 av. des Tilleuls', color:'#8b5cf6', logs:[
    {ref:'B201', loc:'PETIT'},{ref:'B202', loc:'ROUX'}]},
];
const LOT_IMM = 'vh'; // immeuble par défaut du lot

function render(){
  document.documentElement.setAttribute('data-theme', S.theme);
  const f = document.getElementById('frame');
  f.className = 'mk-frame' + (S.fmt==='tab'?' tab':S.fmt==='phone'?' phone':'');
  document.querySelectorAll('#grp-step button').forEach(b=>b.classList.toggle('on', +b.dataset.step===S.step));
  document.querySelectorAll('#grp-fmt button').forEach(b=>b.classList.toggle('on', b.dataset.fmt===S.fmt));
  document.querySelectorAll('#grp-theme button').forEach(b=>b.classList.toggle('on', b.dataset.themeBtn===S.theme));
  document.getElementById('m-sub').textContent = 'Étape '+S.step+' sur 6';

  // stepper
  const labels=[['Dépôt',1],['Colonnes',2],['Compte',3],['Période',4],['Aperçu',5],['Fini',6]];
  document.getElementById('wz-steps').innerHTML = labels.map(([l,n],i)=>{
    let cls = S.step>n?'done':S.step===n?'act':'';
    if(n===2) cls += ' '+(S.step===2?'':'skip'); // étape 2 = conditionnelle
    return `<div class="wz-stp ${cls}"><span class="n">${S.step>n?'✓':n}</span>${l}${n===2?' ⚠':''}</div>${i<5?'<span class="wz-sep">›</span>':''}`;
  }).join('');

  document.getElementById('wz-body').innerHTML = [step1,step2,step3,step4,step5,step6][S.step-1]();
  document.getElementById('wz-back').style.visibility = S.step>1?'visible':'hidden';
  const next = document.getElementById('wz-next');
  next.textContent = S.step===6?'Voir mes mouvements ›':S.step===5?'Importer 7 écritures ›':'Continuer ›';
  const hints={1:'CSV, OFX, QFX, Excel ou collage direct.',2:'Détection auto échouée → vous mappez à la main.',
    3:'Le compte mémorise la banque et la date du dernier import.',4:'Évite de réimporter ce que vous avez déjà.',
    5:'Affectez chaque ligne à un bien · doublons pré-cochés.',6:'Date du dernier import mémorisée sur le compte.'};
  document.getElementById('wz-hint').textContent = hints[S.step];
  const caps={
    1:'<b>Étape 1 — Dépôt.</b> Inchangé : fichier OU collage. Le collage Excel/banque est ajouté (wizard unifié).',
    2:'<b>Étape 2 — Mapping de secours.</b> <span class="fix">CORRECTIF #1</span> N\'apparaît QUE si la détection auto des colonnes échoue. Avant : écran vide « 0 ligne » = ton « CSV ne fonctionne pas ». Maintenant : tu associes les colonnes à la main, mémorisé pour la prochaine fois.',
    3:'<b>Étape 3 — Rattachement compte.</b> Inchangé : « fichier non reconnu, à quel compte le rattacher ? ». C\'est ici que se mémorise le compte + la date du dernier import.',
    4:'<b>Étape 4 — Période.</b> Inchangé. 1er import : 3 choix. Imports suivants : reprise auto après le dernier import (fingerprint).',
    5:'<b>Étape 5 — Aperçu & affectation.</b> <span class="fix">CORRECTIF #2</span> Immeuble en tête de lot → le dropdown logement ne montre QUE les logements de cet immeuble (fini la liste à plat). « Autre immeuble » par ligne si le relevé mélange. Catégories = tes 27 officielles.',
    6:'<b>Étape 6 — Confirmation.</b> Inchangé : X importés / Y doublons + date du dernier import mémorisée (réutilisée à l\'étape 4 du prochain import et affichée dans Mouvements).'};
  document.getElementById('cap').innerHTML = caps[S.step];
  document.getElementById('mk-note').innerHTML = '6 étapes du vrai wizard. <b>Étapes 2 et 5 = les 2 correctifs</b>, le reste est fidèle à l\'existant.';
  bind();
}

function step1(){return `
  <div class="drop"><div class="big">📥</div><b>Glissez votre relevé ici</b>
    <div class="mut">ou cliquez pour parcourir — .csv .ofx .qfx .txt</div></div>
  <div class="orsep">— ou —</div>
  <div class="fg"><label>Coller depuis Excel / le site de la banque <span class="fixbadge">nouveau</span></label>
    <textarea class="inp" rows="2" placeholder="Collez les lignes copiées (Ctrl+V)…"></textarea></div>
  <div class="filechip">
    <span class="ic">📄</span>
    <div><b>releve_ca_juin2026.csv</b><div class="mut">18 lignes · 4,2 Ko</div></div>
    <div class="detect"><span class="ok">✓ CSV · séparateur «;» · UTF-8</span>
      <span class="warn">⚠️ Colonnes non reconnues</span></div>
  </div>`;
}
function step2(){
  const champs=['(ignorer)','Date','Libellé','Débit','Crédit','Montant signé'];
  const cols=[['Date opération','06/06/2026','Date'],['Libellé écriture','VIR LOYER MARTIN','Libellé'],
    ['Débit euros','','Débit'],['Crédit euros','730,00','Crédit'],['Date valeur','06/06/2026','(ignorer)'],['Solde','12 480,12','(ignorer)']];
  return `
  <div class="rescue-note">⚠️ <b>Détection automatique échouée</b> — en-têtes inhabituels (accents, BOM, intitulés longs). Indiquez à quoi correspond chaque colonne. Avant ce correctif, vous tombiez ici sur un écran vide.</div>
  <div class="map-grid">${cols.map(([src,ex,sel])=>`
    <div class="map-row"><div class="map-src">${src}<div class="ex">ex : ${ex||'—'}</div></div>
      <div class="map-arr">→</div>
      <select class="inp">${champs.map(c=>`<option ${c===sel?'selected':''}>${c}</option>`).join('')}</select></div>`).join('')}
  </div>
  <div class="map-preview"><table class="mini">
    <thead><tr><th>Date</th><th>Libellé</th><th>Débit</th><th>Crédit</th></tr></thead>
    <tbody>
      <tr><td>06/06/2026</td><td>VIR LOYER MARTIN</td><td>—</td><td style="color:var(--grn)">730,00</td></tr>
      <tr><td>03/06/2026</td><td>PREL ASSURANCE PNO</td><td style="color:var(--red)">142,00</td><td>—</td></tr>
      <tr><td>02/06/2026</td><td>CECA GERANCE VH</td><td style="color:var(--red)">88,00</td><td>—</td></tr>
    </tbody></table></div>
  <div class="memo">💾 Cette correspondance sera mémorisée pour les prochains imports de ce compte.</div>`;
}
function step3(){return `
  <div style="font-size:12.5px;color:var(--t2);margin-bottom:13px">Fichier non reconnu — à quel compte bancaire ImmoTrack le rattacher ?</div>
  <div class="acct sel"><div class="radio"></div><span class="ic">🏦</span>
    <div><b>Crédit Agricole</b><div class="mut">SCI du Parc · compte courant</div></div><span class="tag">12 fichiers reconnus</span></div>
  <div class="acct"><div class="radio"></div><span class="ic">🏦</span>
    <div><b>Boursorama</b><div class="mut">M. Keller · compte courant</div></div><span class="tag">5 fichiers</span></div>
  <div class="acct"><div class="radio"></div><span class="ic">➕</span>
    <div><b>Nouveau compte…</b><div class="mut">Saisir un libellé + rattacher à une entité</div></div></div>`;
}
function step4(){return `
  <div class="reprise" style="margin-bottom:14px">🔁 <b>Imports suivants</b> — quand un import a déjà été fait, l'app reprend automatiquement après le dernier import du 06/06 (rien à choisir). Les 3 options ci-dessous ne s'affichent qu'au <b>tout premier import</b> d'un compte :</div>
  <div class="mode sel"><div class="radio"></div><div><b>À partir d'une date</b><div class="mut">Par défaut : les 30 derniers jours (07/05/2026). Évite d'importer tout l'historique.</div></div></div>
  <div class="mode"><div class="radio"></div><div><b>Tout l'historique du fichier</b><div class="mut">Les 18 lignes, de la plus ancienne à la plus récente.</div></div></div>
  <div class="mode"><div class="radio"></div><div><b>Sélection manuelle</b><div class="mut">Vous cochez ligne par ligne dans le tableau d'aperçu.</div></div></div>`;
}
function step5(){
  const imm = IMMS.find(i=>i.id===LOT_IMM);
  const logOpts = (selRef)=> imm.logs.map(l=>`<option ${l.ref===selRef?'selected':''}>${l.ref} · ${l.loc}</option>`).join('');
  const rows=[
    {dt:'06/06',lib:'VIR LOYER MARTIN',amt:'+730,00',cr:true,cat:'Loyers encaissés',log:'A101',conf:'hi',cf:'95%',dup:false},
    {dt:'06/06',lib:'VIR LOYER DUBOIS',amt:'+300,00',cr:true,cat:'Loyers encaissés',log:'A102',conf:'lo',cf:'60%',dup:false,note:'≠ loyer attendu (580 €)'},
    {dt:'03/06',lib:'PREL ASSURANCE PNO',amt:'−142,00',cr:false,cat:'Assurances',log:'__imm',conf:'hi',cf:'90%',dup:false},
    {dt:'02/06',lib:'CECA GERANCE VH',amt:'−88,00',cr:false,cat:'Frais de gestion',log:'__imm',conf:'hi',cf:'88%',dup:true,reason:'déjà importé le 02/06'},
  ];
  return `
  <div class="lotbar">
    <div class="seg"><span class="k">Compte</span><span class="v">🏦 Crédit Agricole</span></div>
    <div class="seg"><span class="k">Entité</span><span class="v">🏛️ SCI du Parc</span></div>
    <div class="seg"><span class="k">Immeuble du lot <span class="fixbadge">scope</span></span>
      <select class="inp">${IMMS.map(i=>`<option ${i.id===LOT_IMM?'selected':''}>${i.nom}</option>`).join('')}</select></div>
    <div class="hint">↳ Le choix de logement ci-dessous ne propose que les logements de cet immeuble. Une ligne sur un autre immeuble ? → « autre immeuble ».</div>
  </div>
  <div class="badges">
    <span class="badge tot">18 lignes parsées</span>
    <span class="badge new">5 nouvelles</span>
    <span class="badge dup">2 doublons</span>
    <span class="badge imp">7 à importer</span>
  </div>
  <div class="pv-wrap"><table class="pv">
    <thead><tr><th></th><th>Date</th><th>Libellé</th><th class="col-r">Montant</th><th>Catégorie</th><th>Bien</th><th>Conf.</th><th></th></tr></thead>
    <tbody>
    ${rows.map(r=>`<tr class="${r.dup?'dup':''}">
      <td><input type="checkbox" ${r.dup?'':'checked'}></td>
      <td style="color:var(--t2);white-space:nowrap">${r.dt}</td>
      <td><b style="font-weight:600">${r.lib}</b>${r.note?`<div style="font-size:10px;color:var(--ora)">⚠️ ${r.note}</div>`:''}${r.dup?`<div style="font-size:10px;color:var(--t2);font-style:italic">↺ ${r.reason}</div>`:''}</td>
      <td class="col-r"><span class="${r.cr?'amt-cr':'amt-db'}">${r.amt}</span></td>
      <td><select class="inp">${STD_CATS.map(c=>`<option ${c===r.cat?'selected':''}>${c}</option>`).join('')}</select></td>
      <td><div class="bienpick"><span class="immdot" style="background:${imm.color}"></span>
        ${r.log==='__imm'
          ? `<select class="inp"><option selected>— Immeuble entier —</option>${logOpts(null)}</select>`
          : `<select class="inp">${logOpts(r.log)}<option>— Immeuble entier —</option></select>`}
        </div><span class="altlink">autre immeuble ↗</span></td>
      <td><span class="conf ${r.conf}"><span class="dot"></span>${r.cf}</span></td>
      <td><button class="rule-btn">＋ Règle</button></td>
    </tr>`).join('')}
    </tbody></table></div>
  <div style="font-size:11px;color:var(--t2);margin-top:9px;line-height:1.5">💡 « ＋ Règle » mémorise « ce libellé → ce bien + cette catégorie » pour automatiser les prochains imports (mécanisme déjà existant).</div>`;
}
function step6(){return `
  <div class="conf-box">
    <div class="big">✅</div><h4>Import terminé</h4>
    <div class="mut">Relevé Crédit Agricole · Juin 2026</div>
    <div class="conf-stats">
      <div class="conf-stat new"><div class="n">5</div><div class="l">écritures ajoutées</div></div>
      <div class="conf-stat dup"><div class="n">2</div><div class="l">doublons ignorés</div></div>
    </div>
    <div class="conf-acct"><span class="ic">🏦</span>
      <div><b>Compte Crédit Agricole (SCI du Parc)</b><br>
      <span style="color:var(--t2)">Dernier import mémorisé : <b>06/06/2026 à 09:14</b>. Réutilisé pour la reprise du prochain import, et affiché dans l'onglet Mouvements.</span></div>
    </div>
  </div>`;
}

function bind(){
  document.querySelectorAll('.acct').forEach(a=>a.onclick=()=>{document.querySelectorAll('.acct').forEach(x=>x.classList.remove('sel'));a.classList.add('sel');});
  document.querySelectorAll('.mode').forEach(m=>m.onclick=()=>{document.querySelectorAll('.mode').forEach(x=>x.classList.remove('sel'));m.classList.add('sel');});
}
document.getElementById('grp-step').onclick=e=>{const b=e.target.closest('button');if(!b)return;S.step=+b.dataset.step;render();};
document.getElementById('grp-fmt').onclick=e=>{const b=e.target.closest('button');if(!b)return;S.fmt=b.dataset.fmt;render();};
document.getElementById('grp-theme').onclick=e=>{const b=e.target.closest('button');if(!b)return;S.theme=b.dataset.themeBtn;render();};
document.getElementById('wz-back').onclick=()=>{if(S.step>1){S.step--;render();}};
document.getElementById('wz-next').onclick=()=>{if(S.step<6){S.step++;render();}};
render();
</script>
</body>
</html>
