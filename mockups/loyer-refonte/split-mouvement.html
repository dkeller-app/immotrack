<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Découper un mouvement — loyer / CAF / manuel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<style>
[data-theme="light"]{
  --bg:#eef2f7;
  --sur:rgba(255,255,255,.95); --sur2:rgba(242,246,251,.97); --sur3:rgba(230,236,245,.8);
  --bor:rgba(0,0,0,.09); --bor2:rgba(0,0,0,.05);
  --t1:#1a2332; --t2:#5a6e87; --t3:#9aabbf;
  --grn:#16a34a; --red:#dc2626; --ora:#ea580c; --acc:#3b7ef6; --blu:#3b7ef6; --vio:#7c3aed;
  --r:8px; --rl:14px;
  --bg-success:rgba(22,163,74,.10); --bg-danger:rgba(220,38,38,.10);
  --bg-warning:rgba(234,88,12,.12); --bg-info:rgba(59,126,246,.10); --bg-vio:rgba(124,58,237,.10);
}
[data-theme="dark"]{
  --bg:#0A0E27;
  --sur:#141a35; --sur2:#1b2244; --sur3:#232b52;
  --bor:rgba(255,255,255,.10); --bor2:rgba(255,255,255,.05);
  --t1:#e8ecf6; --t2:#9aa6c4; --t3:#6b779a;
  --grn:#10B981; --red:#EF4444; --ora:#F59E0B; --acc:#0E73F6; --blu:#0E73F6; --vio:#a78bfa;
  --r:8px; --rl:14px;
  --bg-success:rgba(16,185,129,.14); --bg-danger:rgba(239,68,68,.14);
  --bg-warning:rgba(245,158,11,.14); --bg-info:rgba(14,115,246,.14); --bg-vio:rgba(167,139,250,.14);
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--t1);font-family:'IBM Plex Sans',system-ui,-apple-system,sans-serif}

/* ── barre mockup ── */
.mk-bar{position:sticky;top:0;z-index:50;display:flex;flex-wrap:wrap;gap:12px;align-items:center;
  padding:11px 18px;background:#0f172a;color:#e2e8f0;border-bottom:1px solid #1e293b}
.mk-bar h1{font-family:'Manrope',sans-serif;font-size:13.5px;margin:0;font-weight:800;letter-spacing:-.2px}
.mk-grp{display:flex;gap:4px;background:#1e293b;border-radius:10px;padding:3px;flex-wrap:wrap}
.mk-grp button{border:none;background:transparent;color:#94a3b8;font:inherit;font-size:12px;font-weight:600;
  padding:6px 11px;border-radius:7px;cursor:pointer;transition:.15s;white-space:nowrap}
.mk-grp button.on{background:var(--acc);color:#fff}
.mk-grp button:not(.on):hover{color:#e2e8f0}
.mk-lbl{font-size:10.5px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.mk-note{font-size:11px;color:#94a3b8;margin-left:auto;max-width:330px;line-height:1.4}
.mk-stage{padding:24px 16px 70px;display:flex;justify-content:center}
.mk-frame{width:760px;max-width:100%;transition:width .25s ease}
.mk-frame.tab{width:680px} .mk-frame.phone{width:390px}
.mk-cap{font-size:11.5px;color:var(--t2);text-align:center;margin:0 0 14px;line-height:1.55}
.mk-cap b{color:var(--t1)} .mk-cap .new{color:var(--vio);font-weight:700}

/* ── modale ── */
.modal{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rl);overflow:hidden;
  box-shadow:0 24px 64px rgba(0,0,0,.18)}
.m-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bor)}
.m-head h3{font-size:15.5px;font-weight:700;font-family:'Manrope',sans-serif;margin:0}
.m-head .mu{font-size:11.5px;color:var(--t2);margin-top:2px}
.m-close{background:none;border:none;color:var(--t2);cursor:pointer;font-size:18px;padding:4px}
.m-body{padding:18px 20px;min-height:220px}
.m-foot{padding:13px 20px;border-top:1px solid var(--bor);display:flex;justify-content:space-between;gap:8px;
  background:var(--sur2);align-items:center;flex-wrap:wrap}

/* ── source du mouvement ── */
.src-line{display:flex;align-items:center;gap:12px;background:var(--sur2);border:1px solid var(--bor);
  border-radius:var(--r);padding:11px 14px;margin-bottom:14px}
.src-line .ic{font-size:22px}
.src-line b{font-size:13.5px}
.src-line .mut{font-size:11.5px;color:var(--t2)}
.src-line .amt{margin-left:auto;font-size:16px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}
.amt-cr{color:var(--grn)} .amt-db{color:var(--red)}

/* ── chips méthode de découpe ── */
.methods{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.method{flex:1;min-width:150px;border:1.5px solid var(--bor);background:var(--sur2);border-radius:var(--r);
  padding:10px 12px;cursor:pointer;text-align:left;font:inherit}
.method.on{border-color:var(--acc);background:var(--bg-info)}
.method b{font-size:12.5px;display:flex;align-items:center;gap:6px}
.method .d{font-size:11px;color:var(--t2);margin-top:3px;line-height:1.35}
.auto-note{background:var(--bg-info);border:1px solid #bfdbfe;border-left:3px solid var(--acc);
  border-radius:0 var(--r) var(--r) 0;padding:9px 13px;font-size:11.5px;line-height:1.5;margin:12px 0}
[data-theme="dark"] .auto-note{border-color:rgba(14,115,246,.4)}
.auto-note.vio{background:var(--bg-vio);border-color:#ddd6fe;border-left-color:var(--vio)}
[data-theme="dark"] .auto-note.vio{border-color:rgba(167,139,250,.4)}
.auto-note b{color:var(--t1)}

/* ── lignes de split ── */
.splithead{display:grid;gap:7px;align-items:center;padding:0 4px 6px;
  font-size:9.5px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.4px}
.splitrow{display:grid;gap:7px;align-items:center;margin-bottom:7px;padding:8px;border:1px solid var(--bor2);
  border-radius:var(--r);background:var(--sur2)}
.splithead,.splitrow{grid-template-columns:1.5fr 100px 1.4fr 26px}
.mk-frame.phone .splithead{display:none}
.mk-frame.phone .splitrow{grid-template-columns:1fr 90px;grid-auto-rows:auto}
.mk-frame.phone .splitrow .full{grid-column:1/-1}
.inp{background:var(--sur);border:1.5px solid var(--bor);border-radius:var(--r);color:var(--t1);
  padding:7px 9px;font-size:12.5px;font-family:inherit;width:100%}
.inp:focus{outline:none;border-color:var(--blu);box-shadow:0 0 0 3px rgba(59,126,246,.12)}
select.inp{cursor:pointer}
.inp.amt-in{text-align:right;font-variant-numeric:tabular-nums;font-weight:700}
.del-btn{background:none;border:none;color:var(--red);font-size:15px;cursor:pointer;padding:2px}
.locked{opacity:.62}
.dest-chip{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;border-radius:8px;
  padding:2px 8px;margin-top:5px;border:1px solid transparent;white-space:nowrap}
.dest-chip.l211{background:var(--bg-success);color:var(--grn);border-color:#86efac}
.dest-chip.regul{background:var(--bg-vio);color:var(--vio);border-color:#ddd6fe}
.dest-chip.charge{background:var(--bg-warning);color:var(--ora);border-color:#fcd34d}
.rowmeta{grid-column:1/-1;display:flex;gap:7px;flex-wrap:wrap;padding-left:2px}

.addrow{border:1.5px dashed var(--bor);background:none;color:var(--t2);border-radius:var(--r);
  padding:8px;width:100%;cursor:pointer;font:inherit;font-size:12px;font-weight:600}
.addrow:hover{border-color:var(--acc);color:var(--acc)}

/* ── pied : équilibre ── */
.reste{font-size:12.5px;font-weight:600}
.reste .ok{color:var(--grn)} .reste .ko{color:var(--red)}
.reste .tot{color:var(--t1)}
.bar{height:6px;border-radius:3px;background:var(--sur3);overflow:hidden;margin-top:7px;width:200px}
.bar > i{display:block;height:100%;background:var(--acc);transition:width .2s}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--r);border:none;
  cursor:pointer;font-size:13px;font-weight:700;font-family:inherit}
.bp{background:var(--blu);color:#fff;box-shadow:0 2px 8px rgba(59,126,246,.3)}
.bp:disabled{opacity:.45;box-shadow:none;cursor:not-allowed}
.bs{background:var(--sur);color:var(--t1);border:1px solid var(--bor)}
</style>
</head>
<body>

<div class="mk-bar">
  <h1>✂️ Découper un mouvement</h1>
  <span class="mk-lbl">Cas</span>
  <div class="mk-grp" id="grp-scen">
    <button data-scen="loyer" class="on">Loyer tout-compris</button>
    <button data-scen="caf">CAF · plusieurs locataires</button>
    <button data-scen="manuel">Découpe manuelle</button>
  </div>
  <span class="mk-lbl">Format</span>
  <div class="mk-grp" id="grp-fmt">
    <button data-fmt="pc" class="on">💻 PC</button>
    <button data-fmt="tab">Tab</button>
    <button data-fmt="phone">📱 Tél</button>
  </div>
  <div class="mk-grp" id="grp-theme">
    <button data-theme-btn="light" class="on">☀️</button>
    <button data-theme-btn="dark">🌙</button>
  </div>
  <p class="mk-note" id="mk-note"></p>
</div>

<div class="mk-stage">
  <div class="mk-frame" id="frame">
    <p class="mk-cap" id="cap"></p>
    <div class="modal">
      <div class="m-head">
        <div>
          <h3>✂️ Découper ce mouvement</h3>
          <div class="mu">Un seul encaissement à la banque = plusieurs lignes comptables</div>
        </div>
        <button class="m-close">✕</button>
      </div>
      <div class="m-body">
        <div class="src-line" id="src"></div>
        <div class="methods" id="methods"></div>
        <div id="autonote"></div>
        <div class="splithead" id="splithead"></div>
        <div id="rows"></div>
        <button class="addrow" id="addrow">＋ Ajouter une ligne</button>
      </div>
      <div class="m-foot">
        <div>
          <div class="reste" id="reste"></div>
          <div class="bar"><i id="barfill"></i></div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn bs">Annuler</button>
          <button class="btn bp" id="confirm">Enregistrer les lignes</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ── données démo (modèle réel : bail.hc / bail.ch, locataires multiples) ── */
const CATS = ['Loyers encaissés','Provisions sur charges','Régularisation de charges','Aide au logement (CAF/APL)',
  'Dépôt de garantie','Travaux & entretien','Taxe foncière','Assurances','Frais de gestion','Autres recettes'];

// Scénario LOYER : un virement unique « tout compris » = loyer HC (bail.hc) + provision charges (bail.ch)
const BAIL = { ref:'A101', loc:'MARTIN', imm:'12 rue Victor Hugo', hc:540, ch:80 };

// Scénario CAF : un virement CAF groupé qui couvre 3 locataires (APL versée au bailleur)
const CAF_PARTS = [
  { ref:'A101', loc:'MARTIN',  imm:'12 rue Victor Hugo', montant:210 },
  { ref:'A103', loc:'BERNARD', imm:'12 rue Victor Hugo', montant:175 },
  { ref:'B202', loc:'ROUX',    imm:'8 av. des Tilleuls', montant:140 },
];

const SCEN = {
  loyer: {
    src:{ic:'🏦',lib:'VIR M. MARTIN LOYER JUIN',acct:'Crédit Agricole',date:'06/06/2026',montant:620,sens:'cr'},
    cap:'<b>Cas n°1 — Loyer « tout compris ».</b> Le locataire vire <b>620 €</b> en un seul paiement. Pour la 2044, il faut séparer le <b>loyer (ligne 211)</b> de la <b>provision pour charges</b> (qui n\'est pas une recette : elle s\'annule à la régularisation). <span class="new">Nouveau : « Découper selon le bail »</span> lit le bail (HC 540 + charges 80) et pré-remplit tout seul.',
    note:'mvt loyer → 2 lignes : loyer 211 + provision charges',
  },
  caf: {
    src:{ic:'🏛️',lib:'VIR CAF MOSELLE ALLOC LOGT',acct:'Crédit Agricole',date:'05/06/2026',montant:525,sens:'cr'},
    cap:'<b>Cas n°2 — CAF pour plusieurs locataires.</b> La CAF verse <b>525 €</b> au bailleur en un seul virement pour <b>3 locataires</b>. <span class="new">Nouveau : « Répartir par locataire »</span> propose une ligne par bénéficiaire (montants pré-remplis depuis l\'APL connue de chaque bail), chacune rattachée au bon logement.',
    note:'mvt CAF → 1 ligne par locataire bénéficiaire',
  },
  manuel: {
    src:{ic:'🏦',lib:'VIR DIVERS A REPARTIR',acct:'Crédit Agricole',date:'04/06/2026',montant:300,sens:'cr'},
    cap:'<b>Cas n°3 — Découpe manuelle.</b> Le découpage libre existant : vous créez les lignes à la main (libellé, montant, catégorie, logement), la somme doit retomber sur le total. Sert quand aucun automatisme ne s\'applique.',
    note:'découpe libre — somme = total, sinon bouton bloqué',
  },
};

let S = { scen:'loyer', fmt:'pc', theme:'light', method:null, rows:[] };

function buildRows(scen){
  if(scen==='loyer') return [
    {lib:'Loyer hors charges — '+BAIL.ref, montant:BAIL.hc, cat:'Loyers encaissés', qui:BAIL.ref, dest:'l211', locked:false},
    {lib:'Provision pour charges — '+BAIL.ref, montant:BAIL.ch, cat:'Provisions sur charges', qui:BAIL.ref, dest:'regul', locked:false},
  ];
  if(scen==='caf') return CAF_PARTS.map(p=>(
    {lib:'APL '+p.loc, montant:p.montant, cat:'Aide au logement (CAF/APL)', qui:p.ref, dest:'l211', locked:false}));
  return [
    {lib:'Part 1', montant:'', cat:'', qui:'', dest:null, locked:false},
    {lib:'Part 2', montant:'', cat:'', qui:'', dest:null, locked:false},
  ];
}

const DEST_LBL = {
  l211:'<span class="dest-chip l211">🧾 2044 · ligne 211 (recette)</span>',
  regul:'<span class="dest-chip regul">👥 Régularisation des charges · pas une recette imposable</span>',
  charge:'<span class="dest-chip charge">🧾 2044 · charge déductible</span>',
};

function render(){
  document.documentElement.setAttribute('data-theme', S.theme);
  const f=document.getElementById('frame');
  f.className='mk-frame'+(S.fmt==='tab'?' tab':S.fmt==='phone'?' phone':'');
  document.querySelectorAll('#grp-scen button').forEach(b=>b.classList.toggle('on',b.dataset.scen===S.scen));
  document.querySelectorAll('#grp-fmt button').forEach(b=>b.classList.toggle('on',b.dataset.fmt===S.fmt));
  document.querySelectorAll('#grp-theme button').forEach(b=>b.classList.toggle('on',b.dataset.themeBtn===S.theme));

  const sc=SCEN[S.scen]; const src=sc.src;
  document.getElementById('cap').innerHTML=sc.cap;
  document.getElementById('mk-note').innerHTML=sc.note;
  document.getElementById('src').innerHTML=`<span class="ic">${src.ic}</span>
    <div><b>${src.lib}</b><div class="mut">${src.acct} · ${src.date}</div></div>
    <span class="amt ${src.sens==='cr'?'amt-cr':'amt-db'}">${src.sens==='cr'?'+':'−'}${src.montant.toLocaleString('fr-FR')} €</span>`;

  // chips méthode
  const methods = S.scen==='loyer'
    ? [['bail','📑 Découper selon le bail','HC 540 € + charges 80 € (pré-rempli)'],['manuel','✍️ Saisir à la main','je choisis les montants']]
    : S.scen==='caf'
    ? [['caf','👥 Répartir par locataire','1 ligne / bénéficiaire (3)'],['manuel','✍️ Saisir à la main','je choisis les montants']]
    : [['manuel','✍️ Découpe manuelle','je crée les lignes']];
  if(!S.method) S.method = methods[0][0];
  document.getElementById('methods').innerHTML = methods.map(([k,t,d])=>
    `<button class="method ${S.method===k?'on':''}" data-m="${k}"><b>${t}</b><div class="d">${d}</div></button>`).join('');

  // note explicative auto
  const an=document.getElementById('autonote');
  if(S.method==='bail') an.innerHTML=`<div class="auto-note">📑 <b>Lu depuis le bail de ${BAIL.ref} (${BAIL.loc}).</b> Loyer hors charges <b>${BAIL.hc} €</b> → recette 2044. Provision charges <b>${BAIL.ch} €</b> → suivi de régularisation (neutre fiscalement). Le total <b>${BAIL.hc+BAIL.ch} €</b> correspond pile au virement.</div>`;
  else if(S.method==='caf') an.innerHTML=`<div class="auto-note vio">👥 <b>Répartition CAF.</b> Chaque part est rattachée au logement du locataire concerné. Montants proposés d\'après l\'aide connue sur chaque bail — ajustez si la CAF a régularisé.</div>`;
  else an.innerHTML='';

  // en-tête colonnes
  document.getElementById('splithead').innerHTML = S.fmt==='phone' ? '' :
    `<div>Libellé</div><div style="text-align:right">Montant €</div><div>Catégorie · logement</div><div></div>`;

  // lignes
  document.getElementById('rows').innerHTML = S.rows.map((r,j)=>rowHtml(r,j)).join('');
  document.getElementById('addrow').style.display = (S.method==='bail'||S.method==='caf') ? 'none' : 'block';
  bindRows();
  updateReste();
}

function rowHtml(r,j){
  const destChip = r.dest ? `<div class="rowmeta">${DEST_LBL[r.dest]||''}</div>` : '';
  return `<div class="splitrow ${r.locked?'locked':''}">
    <input class="inp full" value="${r.lib}" data-j="${j}" data-f="lib" placeholder="Libellé">
    <input class="inp amt-in" type="number" step="0.01" value="${r.montant}" data-j="${j}" data-f="montant" placeholder="0,00">
    <select class="inp full" data-j="${j}" data-f="cat">
      <option value="">– Catégorie –</option>
      ${CATS.map(c=>`<option ${c===r.cat?'selected':''}>${c}</option>`).join('')}
    </select>
    ${S.method==='manuel'?`<button class="del-btn" data-del="${j}" title="Retirer">✕</button>`:'<span></span>'}
    ${destChip}
    <div class="rowmeta" style="${r.qui?'':'display:none'}"><span class="dest-chip" style="background:var(--sur3);color:var(--t2);border-color:var(--bor)">🚪 ${r.qui}</span></div>
  </div>`;
}

function bindRows(){
  document.querySelectorAll('#rows .inp').forEach(inp=>{
    inp.oninput = inp.onchange = e=>{
      const j=+e.target.dataset.j, fld=e.target.dataset.f;
      S.rows[j][fld]= fld==='montant' ? e.target.value : e.target.value;
      if(fld==='montant') updateReste();
    };
  });
  document.querySelectorAll('#rows .del-btn').forEach(b=>b.onclick=()=>{
    S.rows.splice(+b.dataset.del,1); render();
  });
}

function updateReste(){
  const total=SCEN[S.scen].src.montant;
  const used=S.rows.reduce((s,r)=>s+(parseFloat(r.montant)||0),0);
  const reste=Math.round((total-used)*100)/100;
  const ok=Math.abs(reste)<0.005;
  document.getElementById('reste').innerHTML = ok
    ? `<span class="ok">✅ équilibré</span> &nbsp;/ total <span class="tot">${total.toLocaleString('fr-FR')} €</span>`
    : `Reste à affecter : <span class="ko">${reste.toLocaleString('fr-FR')} €</span> &nbsp;/ total <span class="tot">${total.toLocaleString('fr-FR')} €</span>`;
  document.getElementById('barfill').style.width = Math.min(100, used/total*100)+'%';
  document.getElementById('barfill').style.background = ok?'var(--grn)':'var(--acc)';
  document.getElementById('confirm').disabled = !ok;
}

function setScen(s){ S.scen=s; S.method=null; S.rows=buildRows(s); render(); }
function setMethod(m){
  S.method=m;
  if(m==='bail') S.rows=buildRows('loyer');
  else if(m==='caf') S.rows=buildRows('caf');
  else if(m==='manuel' && (S.scen==='loyer'||S.scen==='caf')){
    // garder les lignes pré-remplies mais permettre l'édition / suppression
    if(!S.rows.length) S.rows=buildRows('manuel');
  }
  render();
}

document.getElementById('grp-scen').onclick=e=>{const b=e.target.closest('button');if(b)setScen(b.dataset.scen);};
document.getElementById('grp-fmt').onclick=e=>{const b=e.target.closest('button');if(b){S.fmt=b.dataset.fmt;render();}};
document.getElementById('grp-theme').onclick=e=>{const b=e.target.closest('button');if(b){S.theme=b.dataset.themeBtn;render();}};
document.getElementById('methods').onclick=e=>{const b=e.target.closest('.method');if(b)setMethod(b.dataset.m);};
document.getElementById('addrow').onclick=()=>{S.rows.push({lib:'Part '+(S.rows.length+1),montant:'',cat:'',qui:'',dest:null});render();};

setScen('loyer');
</script>
</body>
</html>
